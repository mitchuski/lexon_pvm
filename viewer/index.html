const DATA = {"generated":"node tools/render_lexicon.mjs (re-derivable; blocks/ is the source)","coverage":{"census":211,"covered":189,"debt":22},"blocks":[{"census":"LEXPVM-T-001","term":"First Person","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### First Person","lex":"LEX First Person.\r\n\r\n\"First Person\" is a person.\r\n\"Swordsman\" is a person.\r\n\"Mage\" is a person.\r\n\"Delegation\" is a text.\r\n\"Revoked\" is a binary.\r\n\r\nThe First Person appoints the Swordsman, and appoints the Mage.\r\n\r\nCLAUSE: Delegate.\r\nThe First Person may register a Delegation.\r\n\r\nCLAUSE: Revoke.\r\nThe First Person may declare Revoked.\r\n\r\nCLAUSE: Close.\r\nThe First Person may, if Revoked is declared, terminate this contract.","notes":"carries the principal-behind-all-delegation property (only the First Person appoints, delegates, revokes, closes: the non-delegable door as clause structure); omits dignity and 7th-capital framing.","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":5,"promiseEdges":5},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-002","term":"Sovereignty","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Sovereignty","lex":"LEX Sovereignty.\n\n\"First Person\" is a person.\n\"Agent\" is a person.\n\"Charter\" is this contract.\n\"Data Control\" is a binary.\n\"Decision Control\" is a binary.\n\"Representation Control\" is a binary.\n\"Engagement Terms\" is a text.\n\nThe First Person appoints the Agent.\n\nCLAUSE: Hold Data.\nThe First Person may declare Data Control.\n\nCLAUSE: Hold Decisions.\nThe First Person may declare Decision Control.\n\nCLAUSE: Hold Representation.\nThe First Person may declare Representation Control.\n\nCLAUSE: Set Terms.\nThe First Person may fix the Engagement Terms.\n\nCLAUSE: Sovereign.\n\"Sovereign\" is defined as: Data Control is declared and Decision Control is declared and Representation Control is declared and the Engagement Terms is fixed.\n\nCLAUSE: Engage.\nThe Agent may, if this Charter is Sovereign: register the Engagement Terms.","notes":"Carries sovereignty as a four-way conjunction: the Sovereign state requires all four canon components (data, decision, representation, and conditional sovereignty as fixed engagement terms), and every component is declarable only by the First Person while the Agent's sole route to engagement runs through the constituted state. Deliberately omits the inalienability framing beyond clause shape, the Gap-as-architectural-expression sentence, and the 7th Capital economic expression (covered separately at T-003). Folded from sovereignty-cluster-charter (canon-forward, run lexr4).","counts":{"definitions":7,"clauses":6,"sentences":6,"triples":6,"promiseEdges":6},"claim":{"type":"conjunction","predicate":"Sovereign","conjuncts":["Data Control","Decision Control","Representation Control","Engagement Terms"]},"grandfathered":false},{"census":"LEXPVM-T-003","term":"7th Capital","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### 7th Capital","lex":"LEX Seventh Capital.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Behavioral Trajectory\" is an amount.\n\"Coordination Task\" is a text.\n\"Boundary Approved\" is a binary.\n\nThe First Person fixes the Behavioral Trajectory, appoints the Swordsman, and appoints the Mage.\n\nCLAUSE: Guard.\nThe Swordsman may certify the Behavioral Trajectory.\n\nCLAUSE: Approve.\nThe Swordsman may declare Boundary Approved.\n\nCLAUSE: Coordinate.\nThe Mage may, if Boundary Approved is declared: send the Coordination Task to the First Person.","notes":"Carries the wealth-stays-home impossibility: the trajectory is fixed by the First Person and certifiable by the Swordsman, and no transfer clause routes it to the Mage, while value-creating coordination still proceeds through the boundary gate. The trajectory is typed as an amount deliberately: the canon defines the term as a capital form (personal wealth), and the amount type is what makes the absence claim falsifiable. Deliberately omits the trajectory-through-sovereignty-space framing, the six traditional capitals, and all economic magnitude claims. Folded from sovereignty-cluster-charter (canon-forward, run lexr4).","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":{"type":"absence","to":"Mage","what":"Behavioral Trajectory"},"grandfathered":false},{"census":"LEXPVM-T-004","term":"Privacy-Delegation Paradox","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Privacy-Delegation Paradox","lex":"LEX Privacy Delegation Paradox.\n\n\"First Person\" is a person.\n\"Single Agent\" is a person.\n\"Task Information\" is data.\n\"Disclosure\" is a binary.\n\"Delegated Task\" is a text.\n\"Behavioral Reconstruction\" is data.\n\nThe First Person appoints the Single Agent, and fixes the Task Information.\n\nCLAUSE: Disclose.\nThe First Person may declare Disclosure.\n\nCLAUSE: Act.\nThe Single Agent may, if Disclosure is declared: register the Delegated Task.\n\nCLAUSE: Expose.\nThe Single Agent may, if Disclosure is declared: register the Behavioral Reconstruction.","notes":"Carries the paradox as a single binary gating two consequences: the same Disclosure that gates the wanted delegation (Act) gates the unwanted exposure (Expose), both held by the one Single Agent, which is the canon's why-single-agents-cannot-solve-it sentence in clause shape; the claim pins the unwanted clause to the shared condition. Deliberately omits the dual-agent resolution (expressed at the covered T-009) and the autonomy-axiom derivation. Folded from sovereignty-cluster-charter (canon-forward, run lexr4).","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Expose","condition":"Disclosure"},"grandfather s a person.\r\n\"Gap\" is a person.\r\n\"Swordsman\" is a person.\r\n\"Mage\" is a person.\r\n\"Seed\" is data.\r\n\"Held Apart\" is a binary.\r\n\r\nThe First Person appoints the Gap, appoints the Swordsman, and appoints the Mage.\r\n\r\nCLAUSE: Draw Seed.\r\nThe Gap may certify the Seed.\r\n\r\nCLAUSE: Hold Apart.\r\nThe Gap may declare Held Apart.\r\n\r\nCLAUSE: Verify.\r\nThe Swordsman may, if Held Apart is declared, certify the Seed.","notes":"carries maximal betweenness as clause structure (no verification path exists except through the Gap's declaration); omits the entropy expression H(X) minus C_S plus C_M.","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-007","term":"Territory","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Territory","lex":"LEX Territory.\n\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Topology Record\" is data.\n\"Story Record\" is a text.\n\"Ceremony Message\" is a text.\n\"Channel Open\" is a binary.\n\nCLAUSE: Traverse.\nThe Swordsman may certify the Topology Record.\n\nCLAUSE: Narrate.\nThe Mage may register the Story Record.\n\nCLAUSE: Open Channel.\nThe Mage may declare Channel Open.\n\nCLAUSE: Ceremony.\nThe Swordsman may, if Channel Open is declared: send the Ceremony Message to the Mage.","notes":"Carries two authority domains with a single gated crossing: each agent acts only on its own domain's record, and the only sentence that crosses territories is the ceremony message, gated on the receiver-opened channel; the never-merge rule is that no clause moves either territory's record across, only ceremony messages cross and only through the gate. Deliberately omits the domain names (spellweb.ai, agentprivacy.ai), the third node bgin.ai, and the repo/process/storage separation levels. Folded from sovereignty-cluster-charter (canon-forward, run lexr4).","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":4,"promiseEdges":4},"claim":{"type":"gate","clause":"Ceremony","condition":"Channel Open"},"grandfathered":false},{"census":"LEXPVM-T-008","term":"Home Territory","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Home Territory","lex":"LEX Home Territory.\n\n\"Extension\" is a person.\n\"First Person\" is a person.\n\"Mana Balance\" is a text.\n\"Inscription Panel\" is a text.\n\"Ceremony Receiver\" is a text.\n\"Home Detected\" is a binary.\n\nThe First Person appoints the Extension.\n\nCLAUSE: Detect.\nThe Extension may declare Home Detected.\n\nCLAUSE: Enable.\nThe Extension may, if Home Detected is declared: register the Mana Balance, grant the Inscription Panel, and afterwards register the Ceremony Receiver.","notes":"Carries detection-then-enablement as an ordered action chain: the enable clause performs the three canon-enabled features (mana balance, inscription panel, ceremony receiver) in the canon's listed order, and only after home detection is declared; the ordering claim pins the sequence and the gate condition carries the detection premise. Deliberately omits the home domain list, the hostname-match mechanism, and the HOME_TERRITORY message name. Folded from sovereignty-cluster-charter (canon-forward, run lexr4).","counts":{"definitions":6,"clauses":2,"sentences":3,"triples":5,"promiseEdges":5},"claim":{"type":"ordering","clause":"Enable","sequence":["register:Mana Balance","grant:Inscription Panel","register:Ceremony Receiver"]},"grandfathered":false},{"census":"LEXPVM-T-009","term":"Dual Agents (s ⊥ m)","register":"glossary · conjectured expression of proven term","cites":"glossary-master-v4 § ### Dual Agents (s ⊥ m)","lex":"LEX Dual Agents.\r\n\r\n\"First Person\" is a person.\r\n\"Swordsman\" is a person.\r\n\"Mage\" is a person.\r\n\"Private State\" is data.\r\n\"Public Task\" is a text.\r\n\"Boundary Approved\" is a binary.\r\n\r\nThe First Person appoints the Swordsman, inary.\r\n\"Projection\" is a text.\r\n\r\nThe First Person appoints the Mage, appoints the Swordsman, and appoints the Counterparty.\r\n\r\nCLAUSE: Compose.\r\nThe Mage may register a Projection.\r\n\r\nCLAUSE: Project.\r\nThe Mage may, if Boundary Approved is declared, send the Projection to the Counterparty.","notes":"carries acts-publicly-on-approved-information-only (the send clause is gated on the Swordsman's declaration); omits coordination with other Mages and capability projection detail.","counts":{"definitions":6,"clauses":2,"sentences":3,"triples":5,"promiseEdges":5},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-012","term":"Superagent","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Superagent","lex":"LEX Superagent.\r\n\r\n\"First Person\" is a person.\r\n\"Swordsman\" is a person.\r\n\"Mage\" is a person.\r\n\"Counterparty\" is a person.\r\n\"Composite\" is this contract.\r\n\"Exterior Promise\" is a text.\r\n\"Protection Promised\" is a binary.\r\n\"Delegation Promised\" is a binary.\r\n\"Authorization Given\" is a binary.\r\n\r\nThe First Person appoints the Swordsman, appoints the Mage, appoints the Counterparty, and fixes the Exterior Promise.\r\n\r\nCLAUSE: Promise Protection.\r\nThe Swordsman may declare Protection Promised.\r\n\r\nCLAUSE: Promise Delegation.\r\nThe Mage may declare Delegation Promised.\r\n\r\nCLAUSE: Authorize.\r\nThe First Person may declare Authorization Given.\r\n\r\nCLAUSE: Composed.\r\n\"Composed\" is defined as: Protection Promised is declared and Delegation Promised is declared and Authorization Given is declared.\r\n\r\nCLAUSE: Act Outward.\r\nThe Mage may, if this Composite is Composed: send the Exterior Promise to the Counterparty.","notes":"composition: the exterior promise is sendable only when all three interior declarations hold (Composed defined-as conjunction), the irreducible-composite property as clause structure; omits emergence formalism.","counts":{"definitions":9,"clauses":5,"sentences":5,"triples":8,"promiseEdges":8},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-013","term":"Promise (Promise Theory)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Promise (Promise Theory)","lex":"LEX Promise.\r\n\r\n\"Promiser\" is a person.\r\n\"Promisee\" is a person.\r\n\"Promise Body\" is a text.\r\n\"Kept\" is a binary.\r\n\r\nThe Promiser appoints the Promisee, and fixes the Promise Body.\r\n\r\nCLAUSE: Make Promise.\r\nThe Promiser may send the Promise Body to the Promisee.\r\n\r\nCLAUSE: Assess.\r\nThe Promisee may declare Kept.","notes":"voluntary (may), directional (promiser to promisee), and independently assessed (only the promisee declares Kept); imposition is structurally impossible, no clause lets either party act on the other's behalf. Polarity (+give / -accept) carried by clause roles.","counts":{"definitions":4,"clauses":2,"sentences":3,"triples":4,"promiseEdges":4},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-014","term":"Autonomy Axiom","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Autonomy Axiom § ### Autonomy Axiom","lex":"LEX Autonomy Axiom.\r\n\r\n\"First Agent\" is a person.\r\n\"Second Agent\" is a person.\r\n\"First Behavior\" is a text.\r\n\"Second Behavior\" is a text.\r\n\r\nThe First Agent fixes the First Behavior.\r\nThe Second Agent fixes the Second Behavior.\r\n\r\nCLAUSE: First Promise.\r\nThe First Agent may register the First Behavior.\r\n\r\nCLAUSE: Second Promise.\r\nThe Second Agent may register the Second Behavior.","notes":"carries only-own-behavior as clause partition (each agent fixes and registers only its own Behavior; no clause lets either agent register the other's, so promising on another's behalf is structurally absent); omits the single-agent paradox implication and the Swordsman/Mage domain split.","counts":{"definitions":4,"clauses":2,"sentences":4,"triples":4,"promiseEdges":4},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-015","term":"Promise Body (τ, χ)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Promise Body (τ, χ) § ### Promise Body (τ, χ)","lex":"LEX Promise Body.\r\n\r\n\"Promiser\" is a person.\r\n\"Promisee\" is a person.\r\n\"Promise Type\" is a text.\r\n\"Promise Constraint\" is a text.\r\n\r\nThe Promiser appoints the Promisee, fixes the Promise Type, and fixes the Promise Constraint.\r\n\r\nCLAUSE: Offer Body.\r\nThe Promiser may send the Promise Type to the Promisee, and send the Promise Constraint to the Promisee.\r\n\r\nCLAUSE: Accept Body.\r\nThe Promisee may certify the Promise Type, and certify the Promise Constraint.","notes":"carries the two-component body b = (type, constraint) as two fixed texts that travel and are accepted together; omits the tau/chi notation and the spell-notation compression mapping.","counts":{"definitions":4,"clauses":2,"sentences":3,"triples":7,"promiseEdges":7},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-016","term":"Conditional Promise (b|c)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Conditional Promise (b|c) § ### Conditional Promise (b|c)","lex":"LEX Conditional Promise.\r\n\r\n\"Promiser\" is a person.\r\n\"Promisee\" is a person.\r\n\"Promise Body\" is a text.\r\n\"Condition Met\" is a binary.\r\n\r\nThe Promiser appoints the Promisee, and fixes the Promise Body.\r\n\r\nCLAUSE: Observe Condition.\r\nThe Promisee may declare Condition Met.\r\n\r\nCLAUSE: Keep Promise.\r\nThe Promiser may, if Condition Met is declared, send the Promise Body to the Promisee.","notes":"carries contingency as a condition-gated send (the Keep Promise clause can fire only once Condition Met is declared); omits the b|c notation and the (s perp m | X) application; pins condition assessment to the Promisee, which the canon leaves abstract.","counts":{"definitions":4,"clauses":2,"sentences":3,"triples":4,"promiseEdges":4},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-017","term":"Assessment α(π)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Assessment α(π) § ### Assessment α(π)","lex":"LEX Assessment.\r\n\r\n\"Promiser\" is a person.\r\n\"Promisee\" is a person.\r\n\"Promise Body\" is a text.\r\n\"Kept\" is a binary.\r\n\"Not Kept\" is a binary.\r\n\r\nThe Promiser appoints the Promisee, and fixes the Promise Body.\r\n\r\nCLAUSE: Deliver.\r\nThe Promiser may send the Promise Body to the Promisee.\r\n\r\nCLAUSE: Assess Kept.\r\nThe Promisee may declare Kept.\r\n\r\nCLAUSE: Assess Not Kept.\r\nThe Promisee may declare Not Kept.","notes":"carries assessment-lies-with-the-promisee (only Promisee clauses hold verdict declarations, in both directions; the Promiser has no verdict clause at all); omits the alpha(pi) notation, RPP compression-ratio quantification, and trust-tier accumulation.","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":5,"promiseEdges":5},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-018","term":"Trust Function","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Trust Function","lex":"LEX Trust Function.\r\n\r\n\"Truster\" is a person.\r\n\"Promiser\" is a person.\r\n\"Kept\" is a binary.\r\n\"Broken\" is a binary.\r\n\"Trust Grant\" is a binary.\r\n\r\nThe Truster appoints the Promiser.\r\n\r\nCLAUSE: Record Kept.\r\nThe Truster may declare Kept.\r\n\r\nCLAUSE: Record Broken.\r\nThe Truster may declare Broken.\r\n\r\nCLAUSE: Trustworthy.\r\n\"Trustworthy\" is defined as: Kept is declared and Broken is not declared.\r\n\r\nCLAUSE: Extend Trust.\r\nThe Truster may, if Kept is declared and Broken is not declared, grant the Trust Grant.","notes":"Carries trust as a function of the truster's own assessment history (only the Truster records outcomes, and extended trust is gated on that record, with 'is not declared' carrying the downgrade-on-breach direction). Omits the numeric 0-to-1 value and the update rule.","counts":{"definitions":5,"clauses":4,"sentences":4,"triples":4,"promiseEdges":4},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-019","term":"Irreducible Promise","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Irreducible Promise § ### Irreducible Promise","lex":"LEX Irreducible Promise.\r\n\r\n\"First Component\" is a person.\r\n\"Second Component\" is a person.\r\n\"Superagent\" is a person.\r\n\"Whole Promise\" is a text.\r\n\"First Part Kept\" is a binary.\r\n\"Second Part Kept\" is a binary.\r\n\r\nThe Superagent appoints the First Component, appoints the Second Component, and fixes the Whole Promise.\r\n\r\nCLAUSE: Keep First Part.\r\nThe First Component may declare First Part Kept.\r\n\r\nCLAUSE: Keep Second Part.\r\nThe Second Component may declare Second Part Kept.\r\n\r\nCLAUSE: Emerge.\r\nThe Superagent may, if First Part Kept is declared and Second Part Kept is declared, register the Whole Promise.","notes":"carries emergence-from-cooperation (the Whole Promise registers only when both components' declarations stand, and no component clause can register it alone); omits adversarial uncapturability and the Gap application.","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-020","term":"Invitation vs. Attack (Imposition)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Invitation vs. Attack (Imposition) § ### Invitation vs. Attack (Imposition)","lex":"LEX Invitation Before Proposal.\r\n\r\n\"Host\" is a person.\r\n\"Guest\" is a person.\r\n\"Invitation\" is a text.\r\n\"Acceptance\" is a binary.\r\n\"Proposal\" is a text.\r\n\r\nThe Host appoints the Guest, fixes the Invitation, and fixes the Proposal.\r\n\r\nCLAUSE: Offer Relationship.\r\nThe Host may send the Invitation to the Guest.\r\n\r\nCLAUSE: Accept Relationship.\r\nThe Guest may declare Acceptance.\r\n\r\nCLAUSE: Propose.\r\nThe Host may, if Acceptance is declared, send the Proposal to the Guest.","notes":"carries invitation as acceptance-before-proposal ordering (the Propose send is gated on the Guest's declared Acceptance); the attack/imposition half is deliberately expressed as absence, no clause sends the Proposal ungated; omits the dark-pattern taxonomy and the MyTerms implementation table.","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-021","term":"Coordination Promise C(b)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Coordination Promise C(b) § ### Coordination Promise C(b)","lex":"LEX Coordination Promise.\r\n\r\n\"First Agent\" is a person.\r\n\"Second Agent\" is a person.\r\n\"Shared Body\" is a text.\r\n\"First Adoption\" is a binary.\r\n\"Second Adoption\" is a binary.\r\n\r\nThe First Agent appoints the Second Agent, and fixes the Shared Body.\r\n\r\nCLAUSE: Adopt.\r\nThe First Agent may declare First Adoption.\r\n\r\nCLAUSE: Reciprocate.\r\nThe Second Agent may declare Second Adoption.\r\n\r\nCLAUSE: Coordinate.\r\nThe First Agent or the Second Agent may, if First Adoption is declared and Second Adoption is declared, certify the Shared Body.","notes":"carries voluntary subordination around a shared body (adoption is 'may' on both sides, and the coordination certify is open to either agent only after both adoptions are declared); omits spell-notation interpretation duties and VRC-formation detail.","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-022","term":"Promise Bundle","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Promise Bundle § ### Promise Bundle","lex":"LEX Promise Bundle.\r\n\r\n\"Promiser\" is a person.\r\n\"Promisee\" is a person.\r\n\"First Body\" is a text.\r\n\"Second Body\" is a text.\r\n\"Bundle\" is data.\r\n\"Bundle Kept\" is a binary.\r\n\r\nThe Promiser appoints the Promisee, fixes the First Body, and fixes the Second Body.\r\n\r\nCLAUSE: Assemble.\r\nThe Promiser may file the Bundle.\r\n\r\nCLAUSE: Deliver Bundle.\r\nThe Promiser may, if the Bundle is filed, send the First Body to the Promisee, and send the Second Body to the Promisee.\r\n\r\nCLAUSE: Assess Bundle.\r\nThe Promisee may declare Bundle Kept.","notes":"carries grouping-for-reuse (one filed Bundle gates a single delivery clause moving both bodies together) and coordinated assessment (one Bundle Kept verdict covers the whole collection); omits the 70:1 reuse-efficiency quantification and VRC bilaterality.","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":7,"promiseEdges":7},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-023","term":"Scope","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Scope § ### Scope","lex":"LEX Scope.\r\n\r\n\"Promiser\" is a person.\r\n\"Insider\" is a person.\r\n\"Outsider\" is a person.\r\n\"Promise Body\" is a text.\r\n\r\nThe Promiser appoints the Insider, appoints the Outsider, and fixes the Promise Body.\r\n\r\nCLAUSE: Share Within Scope.\r\nThe Promiser may send the Promise Body to the Insider.","notes":"carries scope as reachability of send clauses (the Insider is the only send target; the Outsider exists in the contract yet no clause sends the Promise Body to the Outsider, so knowledge boundaries are the clause graph itself); omits the four-row scope table and the reconstruction-ceiling connection.","counts":{"definitions":4,"clauses":1,"sentences":2,"triples":4,"promiseEdges":4},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-024","term":"Valency","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Valency","lex":"LEX Valency.\n\n\"Agent\" is a person.\n\"Guardian\" is a person.\n\"Sword Stake\" is an amount.\n\"Attention Pledge\" is a text.\n\nThe Agent appoints the Guardian.\n\nCLAUSE: Stake.\nThe Guardian may fix the Sword Stake, and afterwards grant the Attention Pledge.","notes":"ordering: clause Stake performs fix:Sword Stake, then grant:Attention Pledge as clause order. Omissions per the term's canon anchor. Assayer-authored (invitation-admission-charter held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":4,"clauses":1,"sentences":2,"triples":3,"promiseEdges":3},"claim":{"type":"ordering","clause":"Stake","sequence":["fix:Sword Stake","grant:Attention Pledge"]},"grandfathered":false},{"census":"LEXPVM-T-025","term":"Reconstruction Ceiling (R_max)","register":"glossary · conjectured expression of proven term","cites":"glossary-master-v4 § ### Reconstruction Ceiling (R_max)","lex":"LEX Reconstruction Ceiling.\n\n\"First Person\" is a person.\n\"Adversary\" is a person.\n\"Gap\" is a person.\n\"State Entropy\" is an amount.\n\"Sword Leakage\" is an amount.\n\"Mage Leakage\" is an amount.\n\"Reconstruction\" is a text.\n\"Channels Exhausted\" is a binary.\n\nThe First Person pays the State Entropy into escrow, appoints the Adversary, appoints the Gap, fixes the Sword Leakage, and fixes the Mage Leakage.\n\nCLAUSE: Drain Sword Channel.\nThe Adversary may pay from escrow the Sword Leakage to themselves.\n\nCLAUSE: Drain Mage Channel.\nThe Adversary may pay from escrow the Mage Leakage to themselves.\n\nCLAUSE: Exhaust.\nThe Adversary may declare Channels Exhausted.\n\nCLAUSE: Reconstruct.\nThe Adversary may, if Channels Exhausted is declared: register a Reconstruction.\n\nCLAUSE: Cap.\nThe First Person may, if Channels Exhausted is declared: return the remainder of the escrow to the Gap.","notes":"Structural: the ceiling as reachability (the Adversary can draw only the two fixed leakage amounts from the escrowed State Entropy, and a Reconstruction registers only after Channels Exhausted is declared; the remainder returns to the Gap and no clause routes it to the Adversary, so reconstruction stays strictly below the whole). Omits the ratio form R_max = (C_S + C_M) / H(X) and its numeric value. Anchor: ### Reconstruction Ceiling (R_max). Folded from escrow-conservation-charter (grammar-forward, run lexr2).","counts":{"definitions":8,"clauses":5,"sentences":6,"triples":10,"promiseEdges":10},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-026","term":"Error Floor (P_e)","register":"glossary · conjectured expression of proven term","cites":"glossary-master-v4 § ### Error Floor (P_e)","lex":"LEX Error Floor.\n\n\"First Person\" is a person.\n\"Adversary\" is a person.\n\"Gap\" is a person.\n\"State Entropy\" is an amount.\n\"Disclosed Portion\" is an amount.\n\"Reconstruction Error\" is a binary.\n\"Channels Drained\" is a binary.\n\nThe First Person pays the State Entropy into escrow, appoints the Adversary, appoints the Gap, and fixes the Disclosed Portion.\n\nCLAUSE: Drain.\nThe Adversary may pay from escrow the Disclosed Portion to themselves.\n\nCLAUSE: Mark Drained.\nThe Adversary may declare Channels Drained.\n\nCLAUSE: Keep Floor.\nThe Gap may, if Channels Drained is declared: return the remainder of the escrow to the First Person.\n\nCLAUSE: Concede Error.\nThe Adversary must, if Channels Drained is declared: declare Reconstruction Error.","notes":"Structural: the floor as an unavoidable consequence (Concede Error is a must clause gated on Channels Drained, so once draining is complete the error declaration is obligatory rather than optional) and conservation (the Gap returns the undisclosed remainder to the First Person, and no clause pays it to the Adversary, which is what forces the error). Omits the inequality P_e is at least 1 minus R_max as a number. Anchor: ### Error Floor (P_e). Folded from escrow-conservation-charter (grammar-forward, run lexr2).","counts":{"definitions":7,"clauses":4,"sentences":5,"triples":8,"promiseEdges":8},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-027","term":"Selene's Proof","register":"glossary · conjectured expression of documented term","cites":"glossary-master-v4 § ### Selene's Proof","lex":"LEX Selene's Proof.\n\n\"Moon\" is a person.\n\"Verifier\" is a person.\n\"Proof\" is this contract.\n\"Tide Mark\" is a text.\n\"Impact Time\" is a time.\n\"Orbit Held\" is a binary.\n\nThe Moon appoints the Verifier, and fixes the Tide Mark.\n\nCLAUSE: Impact.\nThe Moon may fix the Impact Time as the current time.\n\nCLAUSE: Hold Orbit.\nThe Moon may, if the Impact Time is fixed, declare Orbit Held.\n\nCLAUSE: Amnesiac.\n\"Amnesiac\" is defined as: the Impact Time lies at least 24 hours in the past.\n\nCLAUSE: Verify.\nThe Verifier may, if this Proof is Amnesiac: certify the Tide Mark.","notes":"the aging law as a defined temporal predicate (Amnesiac = the impact time lies at least 24 hours in the past) gating the only certify; ordering = orbit holds only after the impact time is fixed. Omits the proof arithmetic and the moon-lore framing. Assayer-authored (temporal-spine-lifecycle-charter held-out, recipe-only); keystone Notes.","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Verify","condition":"Amnesiac"},"grandfathered":false},{"census":"LEXPVM-T-028","term":"Separation Theorem","register":"glossary · conjectured expression of proven term","cites":"glossary-master-v4 § ### Separation Theorem","lex":"LEX Separation Theorem.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Adversary\" is a person.\n\"Theorem\" is this contract.\n\"Swordsman Leakage\" is an amount.\n\"Mage Leakage\" is an amount.\n\"Total Leakage\" is an amount.\n\"Held Apart\" is a binary.\n\nThe First Person appoints the Swordsman, and appoints the Mage.\n\nCLAUSE: Hold Apart.\nThe First Person may declare Held Apart.\n\nCLAUSE: Observe Swordsman.\nThe Adversary may fix the Swordsman Leakage.\n\nCLAUSE: Observe Mage.\nThe Adversary may fix the Mage Leakage.\n\nCLAUSE: Accounted.\n\"Accounted\" is defined as: the Swordsman Leakage is fixed and the Mage Leakage is fixed.\n\nCLAUSE: Account.\nThe Adversary may, if Held Apart is declared and this Theorem is Accounted: fix the Total Leakage.","notes":"Carries the theorem's premise-conclusion structure: the total leakage may be fixed only under the held-apart premise (the conditional-independence condition of the formula) and only from the two marginal observations, whose two-conjunct Accounted definition has no third synergy conjunct, which is additive-not-multiplicative in clause shape; the claim pins the accounting to the premise. Deliberately omits the mutual-information notation, the equality itself as arithmetic, and the proof; the theorem's PROVEN canon status is recorded in the register tag, not upgraded here. Folded from sovereignty-cluster-charter (canon-forward, run lexr4).","counts":{"definitions":9,"clauses":5,"sentences":5,"triples":6,"promiseEdges":6},"claim":{"type":"gate","clause":"Account","condition":"Held Apart"},"grandfathered":false},{"census":"LEXPVM-T-029","term":"Budget Constraint","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Budget Constraint","lex":"LEX Budget Constraint.\r\n\r\n\"First Person\" is a person.\r\n\"Swordsman\" is a person.\r\n\"Mage\" is a person.\r\n\"Counterparty\" is a person.\r\n\"Constraint\" is this contract.\r\n\"Leakage Budget\" is an amount.\r\n\"Disclosure\" is a text.\r\n\"Budget Spent\" is a binary.\r\n\r\nThe First Person appoints the Swordsman, appoints the Mage, appoints the Counterparty, and fixes the Leakage Budget.\r\n\r\nCLAUSE: Compose.\r\nThe Mage may register a Disclosure.\r\n\r\nCLAUSE: Meter.\r\nThe Swordsman may declare Budget Spent.\r\n\r\nCLAUSE: Within Budget.\r\n\"Within Budget\" is defined as: the Leakage Budget is fixed and Budget Spent is not declared.\r\n\r\nCLAUSE: Release.\r\nThe Mage may, if this Constraint is Within Budget: send the Disclosure to the Counterparty.","notes":"carries the budget as a First-Person-fixed amount, the Swordsman as meter, and the constraint as a defined predicate gating every release by the Mage; omits numeric leakage accounting in bits and gradual depletion, since the subset's only numeric literals are hour and day counts. Anchor: ### Budget Constraint.","counts":{"definitions":8,"clauses":4,"sentences":4,"triples":7,"promiseEdges":7},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-030","term":"Conditional Independence","register":"glossary · conjectured expression of proven term","cites":"glossary-master-v4 § ### Conditional Independence","lex":"LEX Conditional Independence.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Private State\" is data.\n\"Shared Information\" is a number, initially 0.\n\"Separation\" is a text.\n\"Pact\" is this contract.\n\nThe First Person appoints the Swordsman, appoints the Mage, and fixes the Private State.\n\nCLAUSE: Conditionally Independent.\n\"Conditionally Independent\" is defined as: the Private State is fixed and the Shared Information is not greater than zero.\n\nCLAUSE: Certify Separation.\nThe First Person may, if this Pact is Conditionally Independent: certify the Separation.","notes":"carries conditional independence as a defined-as conjunction (Conditionally Independent requires the Private State fixed AND the Shared Information not greater than zero: the given-the-conditioning-variable condition and the zero-shared-information bound as joint conjuncts, the number initially 0 as the quantitative anchor), with certification of Separation gated on it; omits the probabilistic definition over distributions and the epsilon form of the bound. Folded from lexr5.1:numeric-anchor-charter (run lexr5).","counts":{"definitions":7,"clauses":2,"sentences":2,"triples":4,"promiseEdges":4},"claim":{"conjuncts":["Private State","Shared Information"],"predicate":"Conditionally Independent","type":"conjunction"},"grandfathered":false},{"census":"LEXPVM-T-031","term":"Mutual Information I(X; Y)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Mutual Information I(X; Y)","lex":"LEX Mutual Information.\n\n\"Subject\" is a person.\n\"Observer\" is a person.\n\"Source Entropy\" is an amount.\n\"Shared Information\" is an amount.\n\"Observation Made\" is a binary.\n\nThe Subject pays the Source Entropy into escrow, appoints the Observer, and fixes the Shared Information.\n\nCLAUSE: Observe.\nThe Observer may declare Observation Made.\n\nCLAUSE: Learn.\nThe Observer may, if Observation Made is declared: pay from escrow the Shared Information to themselves.\n\nCLAUSE: Retain Privacy.\nThe Subject may, if Observation Made is declared: return the remainder of the escrow to the Subject.","notes":"Structural: gating (the Learn payout fires only after Observation Made is declared), conservation and directionality (the Observer can draw only the fixed Shared Information from the escrowed Source Entropy, and the remainder returns to the Subject alone, so what observation provides plus what stays private exhausts the source). Omits the symmetry I(X;Y) = I(Y;X) and the numeric measure in bits. Anchor: ### Mutual Information I(X; Y). Folded from escrow-conservation-charter (grammar-forward, run lexr2).","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-032","term":"Entropy H(X)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Entropy H(X)","lex":"LEX Entropy.\n\n\"First Person\" is a person.\n\"Adversary\" is a person.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Gap\" is a person.\n\"Total Uncertainty\" is an amount.\n\"Sword Channel\" is an amount.\n\"Mage Channel\" is an amount.\n\"Observation Complete\" is a binary.\n\nThe First Person pays the Total Uncertainty into escrow, appoints the Swordsman, appoints the Mage, appoints the Gap, appoints the Adversary, fixes the Sword Channel, and fixes the Mage Channel.\n\nCLAUSE: Observe Swordsman.\nThe Adversary may pay from escrow the Sword Channel to themselves.\n\nCLAUSE: Observe Mage.\nThe Adversary may pay from escrow the Mage Channel to themselves.\n\nCLAUSE: Exhaust Observation.\nThe Adversary may declare Observation Complete.\n\nCLAUSE: Remain Unknowable.\nThe First Person may, if Observation Complete is declared: return the remainder of the escrow to the Gap.","notes":"Structural: conservation as escrow arithmetic (the Sword Channel and Mage Channel payouts plus the returned remainder exhaust the escrowed Total Uncertainty), impossibility as an absent clause (no clause routes the remainder to the Adversary, so residual uncertainty survives any observation strategy), and ordering (the remainder moves only after Observation Complete is declared). Omits logarithms, the bit unit, and the numeric value of H(X). Anchor: ### Entropy H(X). Folded from escrow-conservation-charter (grammar-forward, run lexr2).","counts":{"definitions":9,"clauses":4,"sentences":5,"triples":11,"promiseEdges":11},"claim":{"type":"absence","to":"Adversary","what":"escrow-remainder"},"grandfathered":false},{"census":"LEXPVM-T-033","term":"Zero-Knowledge Proof (ZKP)","register":"glossary · conjectured expression of proven term","cites":"glossary-master-v4 § ### Zero-Knowledge Proof (ZKP)","lex":"LEX Zero Knowledge Proof.\n\n\"First Person\" is a person.\n\"Mage\" is a person.\n\"Credential\" is a text.\n\"Proof\" is a text.\n\"Disclosure Count\" is a number, initially 0.\n\"Protocol\" is this contract.\n\nThe First Person appoints the Mage, and fixes the Credential.\n\nCLAUSE: Zero Knowledge.\n\"Zero Knowledge\" is defined as: the Disclosure Count is not greater than zero.\n\nCLAUSE: Prove.\nThe Mage may send the Proof to the First Person.\n\nCLAUSE: Verify.\nThe First Person may, if this Protocol is Zero Knowledge: certify the Proof.","notes":"carries the zero-knowledge direction as an absence (no transfer clause ever routes the Credential to the First Person, while the Proof does route there: the proof flows, the witness never does), anchored quantitatively by the Disclosure Count initially 0 comparative gating verification; the Mage is the canon-named prover and the First Person holds the verifying side per the cast rule; omits the soundness and completeness games and all cryptographic machinery. Folded from lexr5.1:numeric-anchor-charter (run lexr5).","counts":{"definitions":6,"clauses":3,"sentences":3,"triples":4,"promiseEdges":4},"claim":{"to":"First Person","type":"absence","what":"Credential"},"grandfathered":false},{"census":"LEXPVM-T-034","term":"Trusted Execution Environment (TEE)","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Trusted Execution Environment (TEE)","lex":"LEX Trusted Execution Environment.\n\n\"Operator\" is a person.\n\"Enclave\" is a person.\n\"Verifier\" is a person.\n\"Workload\" is data.\n\"Measurement\" is data.\n\"Result\" is a text.\n\"Attestation Verified\" is a binary.\n\nThe Operator appoints the Enclave.\n\nCLAUSE: Seal.\nThe Operator may file the Workload.\n\nCLAUSE: Measure.\nThe Enclave may file the Measurement.\n\nCLAUSE: Attest.\nThe Verifier may, if Measurement is filed: declare Attestation Verified.\n\nCLAUSE: Process.\nThe Enclave may, if Attestation Verified is declared: certify the Result.","notes":"processing gated on verified attestation: the promise bundle grants processing capability only after the attestation stands verified by the counterparty role. Omits the attestation format. Assayer-authored (promise-bundle-spell held-out, recipe-only); keystone Notes.","counts":{"definitions":7,"clauses":4,"sentences":5,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Process","condition":"Attestation Verified"},"grandfathered":false},{"census":"LEXPVM-T-035","term":"Privacy Pools","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Privacy Pools","lex":"LEX Privacy Pools.\n\nTERMS:\n\n\"Verifier\" is a person.\n\nTERMS PER Note:\n\n\"Note\" is this contract.\n\"Depositor\" is a person.\n\"Flagged Depositor\" is a person.\n\"Deposit\" is an amount.\n\"Association Proof\" is data.\n\"Innocent\" is a binary.\n\nThe Verifier appoints the Depositor, and appoints the Flagged Depositor.\n\nCLAUSE: Enter.\nThe Depositor or the Flagged Depositor may pay the Deposit into escrow.\n\nCLAUSE: Prove.\nThe Depositor may fix the Association Proof.\n\nCLAUSE: Screen.\nThe Verifier may, if the Association Proof is fixed, declare Innocent.\n\nCLAUSE: Withdraw.\nThe Verifier may, if Innocent is declared: return the Deposit to the Depositor, and afterwards terminate this Note.","notes":"Carries the compliant-exit direction as an absence (both the Depositor and the Flagged Depositor may pay the Deposit into escrow, but no transfer clause routes the Deposit to the Flagged Depositor; the only exit is the Withdraw clause, gated on Innocent, which is declared only after an Association Proof is fixed: proving non-association is the condition of getting funds out); omits the cryptographic mixing mathematics and anonymity-set semantics. Folded from instance-charter-family (grammar-forward, run lexr4).","counts":{"definitions":7,"clauses":4,"sentences":5,"triples":8,"promiseEdges":8},"claim":{"type":"absence","to":"Flagged Depositor","what":"Deposit"},"grandfathered":false},{"census":"LEXPVM-T-036","term":"Groth16 / PLONK / Nova","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Groth16 / PLONK / Nova","lex":"LEX Proof System Triad.\n\n\"Prover\" is a person.\n\"Verifier\" is a person.\n\"Ceremony Master\" is a person four named tiers, signal counts, and trust ranges, since numeric literals are out of subset. Folded from promise-bundle-spell (spell-grammar, run lexr3).","counts":{"definitions":6,"clauses":4,"sentences":5,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Exercise","condition":"Tier Advanced"},"grandfathered":false},{"census":"LEXPVM-T-039","term":"Guardian","register":"glossary · conjectured expression of documented term","cites":"glossary-master-v4 § ### Guardian","lex":"LEX Guardian Charter.\n\n\"Guardian\" is a person.\n\"City\" is a person.\n\"Stake\" is an amount.\n\"Validation\" is a text.\n\"Dragon Tier Held\" is a binary.\n\"Integrity Breach\" is a binary.\n\nThe City appoints the Guardian.\n\nCLAUSE: Qualify.\nThe City may declare Dragon Tier Held.\n\nCLAUSE: Commit Stake.\nThe Guardian may, if Dragon Tier Held is declared: pay the Stake into escrow.\n\nCLAUSE: Validate.\nThe Guardian must file the Validation.\n\nCLAUSE: Slash.\nThe City may, if Integrity Breach is declared: pay from escrow the Stake to themselves.","notes":"carries the stake's irreversibility as an impossibility by absence: no transfer clause routes the Stake back to the Guardian, so the valency commitment cannot be reclaimed from the guardian's side; staking is gated on the City's Dragon Tier declaration and validation is a binding duty (must, not may). Direction is load-bearing: slashing routes the escrowed Stake to the City on a declared breach, never back. Omits the stake denomination and the signal threshold, and the source section is WIP status so the register stays documented. Folded from promise-bundle-spell (spell-grammar, run lexr3).","counts":{"definitions":6,"clauses":4,"sentences":5,"triples":5,"promiseEdges":5},"claim":{"type":"absence","to":"Guardian","what":"Stake"},"grandfathered":false},{"census":"LEXPVM-T-040","term":"Relationship Proverb Protocol (RPP)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Relationship Proverb Protocol (RPP)","lex":"LEX Relationship Proverb Protocol.\n\n\"Reader\" is a person.\n\"Author\" is a person.\n\"Source Material\" is a text.\n\"Proverb\" is a text.\n\"Signal\" is an amount.\n\"Understood\" is a binary.\n\nThe Author fixes the Source Material, and appoints the Reader.\n\nCLAUSE: Study.\nThe Reader may certify the Source Material.\n\nCLAUSE: Compress.\nThe Reader may register a Proverb, and afterwards send the Proverb to the Author, and afterwards pay the Signal to the Author.\n\nCLAUSE: Assess.\nThe Author may, if the Proverb is fixed, declare Understood.","notes":"carries the compress-then-signal ordering (the Proverb is registered, then sent, then the Signal paid: proverb formation strictly precedes payment, and assessment is gated on a fixed Proverb); omits the compression-ratio assessment metric and the signal denomination. Folded from send-spine-protocol-family (grammar-forward, run lexr4).","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":7,"promiseEdges":7},"claim":{"type":"ordering","clause":"Compress","sequence":["register:Proverb","send:Proverb","pay:Signal"]},"grandfathered":false},{"census":"LEXPVM-T-041","term":"Signal","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Signal","lex":"LEX Signal.\n\n\"Practitioner\" is a person.\n\"Network\" is a person.\n\"Signal Fee\" is an amount.\n\"Comprehension Proof\" is a text.\n\"Ceremony Complete\" is a binary.\n\nThe Practitioner appoints the Network, and fixes the Signal Fee.\n\nCLAUSE: Complete Ceremony.\nThe Practitioner may declare Ceremony Complete.\n\nCLAUSE: Post Signal.\nThe Practitioner may, if Ceremony Complete is declared: register a Comprehension Proof, and afterwards pay the Signal Fee into escrow.\n\nCLAUSE: Receive.\nThe Network may, if Ceremony Complete is declared: certify the Comprehension Proof.","notes":"Structural: ordering (within Post Signal the Comprehension Proof registers before the Signal al on Origin Forgotten): the circuit propagates through forgetting, not instruction, as reachability structure, with the claimed gate on the re-seeding step. Omits the sun/moon ceremony pairing detail and the property that the new practitioner believes they invented it. Checker: GATE PASS + RELATION PASS (runs/lexr3/lexr3.1/propose-scratch/t045_the_circuit.lex). Folded from temporal-spine-lifecycle-charter (grammar-forward, run lexr3).","counts":{"definitions":7,"clauses":4,"sentences":5,"triples":8,"promiseEdges":8},"claim":{"type":"gate","clause":"Begin Again","condition":"Origin Forgotten"},"grandfathered":false},{"census":"LEXPVM-T-046","term":"Inaugural Pairing","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Inaugural Pairing","lex":"LEX Inaugural Pairing.\n\n\"First Person\" is a person.\n\"First Swordsman\" is a person.\n\"First Mage\" is a person.\n\"Disclosure\" is a text.\n\"Evocation\" is a text.\n\"Pattern\" is data.\n\"Sun Cycle Complete\" is a binary.\n\nThe First Person appoints the First Swordsman, and appoints the First Mage.\n\nCLAUSE: Shine.\nThe First Swordsman may file the Disclosure.\n\nCLAUSE: Complete.\nThe First Swordsman may declare Sun Cycle Complete.\n\nCLAUSE: Reflect.\nThe First Mage may, if Sun Cycle Complete is declared: file the Evocation.\n\nCLAUSE: Orbit.\nThe First Mage may, if Sun Cycle Complete is declared: certify the Pattern.","notes":"Carries cycle zero's orientation as a cross-separation gate (the Moon side's evocation and the orbit pattern both wait on the Sun side's declared completion, never the reverse: the seeding direction of the first ceremony as permission structure); omits the named poems, constellations, and evocations of the two sides. Folded from rite-and-register-spell (spell-grammar, run lexr4).","counts":{"definitions":7,"clauses":4,"sentences":5,"triples":6,"promiseEdges":6},"claim":{"type":"gate","clause":"Reflect","condition":"Sun Cycle Complete"},"grandfathered":false},{"census":"LEXPVM-T-047","term":"Witness (Ceremonial)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Witness (Ceremonial)","lex":"LEX Ceremonial Witness.\r\n\r\n\"Witness\" is a person.\r\n\"First Agent\" is a person.\r\n\"Second Agent\" is a person.\r\n\"Ceremony\" is this contract.\r\n\"Attestation\" is a text.\r\n\"Ceremony Time\" is a time.\r\n\"Presence Confirmed\" is a binary.\r\n\r\nThe First Agent appoints the Second Agent, and appoints the Witness.\r\n\r\nCLAUSE: Attend.\r\nThe Witness may declare Presence Confirmed.\r\n\r\nCLAUSE: Mark Time.\r\nThe Witness may fix the Ceremony Time as the current time.\r\n\r\nCLAUSE: Attested.\r\n\"Attested\" is defined as: Presence Confirmed is declared and the Ceremony Time is fixed.\r\n\r\nCLAUSE: Attest.\r\nThe Witness may, if this Ceremony is Attested: register an Attestation, and afterwards certify the Attestation.","notes":"carries the witness's two ceremonial duties (presence and time-marking) and makes attestation reachable only when the defined predicate Attested holds, with the attested afterwards chain register-then-certify; omits witness selection and any bilateral-witness credential chain. Anchor: ### Witness (Ceremonial).","counts":{"definitions":7,"clauses":4,"sentences":4,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-048","term":"SWORD Token","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### SWORD Token","lex":"LEX SWORD Token.\r\n\r\n\"Swordsman\" is a person.\r\n\"Registrar\" is a person.\r\n\"Reward\" is this contract.\r\n\"SWORD Token\" is an amount.\r\n\"Guardianship\" is a text.\r\n\"Protective Action Recorded\" is a binary.\r\n\"Stake Pledged\" is a binary.\r\n\r\nThe Registrar appoints the Swordsman, and fixes the SWORD Token.\r\n\r\nCLAUSE: Record Action.\r\nThe Swordsman may declare Protective Action Recorded.\r\n\r\nCLAUSE: Pledge Stake.\r\nThe Swordsman may declare Stake Pledged.\r\n\r\nCLAUSE: Earned.\r\n\"Earned\" is defined as: Protective Action Recorded is declared.\r\n\r\nCLAUSE: Guardian Eligible.\r\n\"Guardian Eligible\" is defined as: Protective Action Recorded is declared and Stake Pledged is declared.\r\n\r\nCLAUSE: Pay Reward.\r\nThe Registrar may, if this Reward is Earned: pay the SWORD Token to the Swordsman.\r\n\r\nCLAUSE: Grant Guardianship.\r\nThe Registrar may, if this Reward is Guardian Eligible: grant the Guardianship.","notes":"earning relation: token payment is gated on a declared protective action, guardianship on action plus stake (two defined predicates ordering the economy); omits token quantities and slashing.","counts":{"definitions":7,"clauses":6,"sentences":5,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-049","term":"MAGE Token","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### MAGE Token","lex":"LEX MAGE Token.\n\n\"First Person\" is a person.\n\"Mage\" is a person.\n\"Mage Chronicle\" is a text.\n\"MAGE Token\" is an amount.\n\"VRC Stake\" is an amount, initially 100.\n\"Chronicle Kept\" is a binary.\n\nThe First Person appoints the Mage.\n\nCLAUSE: Chronicle.\nThe Mage may file a Mage Chronicle.\n\nCLAUSE: Assess.\nThe First Person may, if Mage Chronicle is filed, declare Chronicle Kept.\n\nCLAUSE: Earn.\nThe First Person may, if Chronicle Kept is declared, pay the MAGE Token to the Mage.\n\nCLAUSE: Stake.\nThe Mage may, if Chronicle Kept is declared, pay the VRC Stake into escrow.","notes":"captures the earn-then-stake gate structure: minting (Earn) and staking (Stake) both gate on the First Person's Chronicle Kept declaration, never self-declared by the Mage (SG-3), with the canonical 100 MAGE stake for VRC formation carried as an initially-literal on the VRC Stake amount; omits token decay, transfer mechanics, and the VRC formation protocol itself. Folded from lexr5.1:cast-infrastructure-charter (run lexr5).","counts":{"definitions":6,"clauses":4,"sentences":5,"triples":5,"promiseEdges":5},"claim":{"clause":"Earn","condition":"Chronicle Kept","type":"gate"},"grandfathered":false},{"census":"LEXPVM-T-050","term":"Chronicle","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Chronicle","lex":"LEX Chronicle.\r\n\r\n\"Scribe\" is a person.\r\n\"Keeper\" is a person.\r\n\"Chronicle\" is this contract.\r\n\"Session Record\" is a text.\r\n\"Session Close Time\" is a time.\r\n\"Verdict Given\" is a binary.\r\n\r\nThe Keeper appoints the Scribe.\r\n\r\nCLAUSE: Record.\r\nThe Scribe may register a Session Record.\r\n\r\nCLAUSE: State Verdict.\r\nThe Scribe may declare Verdict Given.\r\n\r\nCLAUSE: Mark Close.\r\nThe Scribe may fix the Session Close Time as the current time.\r\n\r\nCLAUSE: Complete.\r\n\"Complete\" is defined as: the Session Record is fixed and Verdict Given is declared and the Session Close Time is fixed.\r\n\r\nCLAUSE: Seal.\r\nThe Keeper may, if this Chronicle is Complete: certify the Session Record.","notes":"carries verdict-first completeness as a three-part defined predicate (record present, verdict declared, close time marked) gating the Keeper's seal; omits chronicle content structure (handoff block, reversals recorded with equal prominence) and append-only storage. Anchor: ### Chronicle.","counts":{"definitions":6,"clauses":5,"sentences":5,"triples":5,"promiseEdges":5},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-051","term":"Golden Ratio (φ)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Golden Ratio (φ)","lex":"LEX Golden Ratio Split.\n\n\"Practitioner\" is a person.\n\"Observer\" is a person.\n\"Shielded Pool\" is a person.\n\"Transparent Share\" is an amount.\n\"Shielded Share\" is an amount.\n\"Split Fixed\" is a binary.\n\nThe Practitioner appoints the Observer.\n\nCLAUSE: Fix Split.\nThe Practitioner may declare Split Fixed.\n\nCLAUSE: Route Transparent.\nThe Practitioner may, if Split Fixed is declared: send the Transparent Share to the Observer.\n\nCLAUSE: Route Shielded.\nThe Practitioner may, if Split Fixed is declared: pay the Shielded Share to the Shielded Pool.","notes":"impossibility as absence: no transfer clause routes Shielded Share to the Observer. Omissions per the term's canon anchor. Assayer-authored (role-charter-spell-family held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":4,"promiseEdges":4},"claim":{"type":"absence","to":"Observer","what":"Shielded Share"},"grandfathered":false},{"census":"LEXPVM-T-052","term":"Intel Pool","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Intel Pool","lex":"LEX Intel Pool.\n\n\"First Person\" is a person.\n\"Pool\" is a text.\n\"Individual Insight\" is a text.\n\"Aggregate Insight\" is a text.\n\"Pool Value\" is a text.\n\nThe First Person fixes the Pool.\n\nCLAUSE: Aggregate.\nThe First Person may file the Individual Insight, and afterwards file the Aggregate Insight, and afterwards register the Pool Value.","notes":"ordering: clause Aggregate performs file:Individual Insight, then file:Aggregate Insight, then register:Pool Value as clause order. Omissions per the term canon anchor. Assayer-authored held-out, recipe-only (run lexr5); keystone Notes.","counts":{"definitions":5,"clauses":1,"sentences":2,"triples":4,"promiseEdges":4},"claim":{"type":"ordering","clause":"Aggregate","sequence":["file:Individual Insight","file:Aggregate Insight","register:Pool Value"]},"grandfathered":false},{"census":"LEXPVM-T-053","term":"Trust Spanning Protocol (TSP)","register":"glossary · conjectured expression of implemented term","cites":"glossary-master-v4 § ### Trust Spanning Protocol (TSP)","lex":"LEX Trust Spanning Protocol.\n\n\"Origin\" is a person.\n\"Relay\" is a person.\n\"Endpoint\" is a person.\n\"Payload\" is an amount.\n\"Envelope\" is data.\n\nThe Origin fixes the Payload, fixes the Envelope, and appoints the Endpoint.\n\nCLAUSE: Span.\nThe Origin may send the Envelope to the Relay.\n\nCLAUSE: Forward.\nThe Relay may, if the Envelope is fixed, send the Envelope to the Endpoint.\n\nCLAUSE: Deliver.\nThe Origin may, if the Envelope is fixed, pay the Payload to the Endpoint.","notes":"carries intermediary blindness as an impossibility (only the sealed Envelope crosses the Relay hop; no transfer clause routes the Payload to the Relay, and the Relay's sole action is gated on the fixed Envelope); omits key management, endpoint identifiers, and wire format. Folded from send-spine-protocol-family (grammar-forward, run lexr4).","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":{"type":"absence","to":"Relay","what":"Payload"},"grandfathered":false},{"census":"LEXPVM-T-054","term":"x402 Protocol","register":"glossary · conjectured expression of implemented term","cites":"glossary-master-v4 § ### x402 Protocol","lex":"LEX Payment Per Request Charter.\n\n\"Client\" is a person.\n\"Server\" is a person.\n\"Request\" is a text.\n\"Resource\" is a text.\n\"Price\" is an amount.\n\"Paid\" is a binary.\n\nThe Server fixes the Price, fixes the Resource, and appoints the Client.\n\nCLAUSE: Ask.\nThe Client may send the Request to the Server.\n\nCLAUSE: Settle.\nThe Client may pay the Price to the Server, and afterwards declare Paid.\n\nCLAUSE: Serve.\nThe Server may, if Paid is declared, send the Resource to the Client.","notes":"carries the payment-gates-delivery structure of the payment-required pattern (the Serve action exists only under Paid declared, and settlement precedes the declaration in the Settle chain); omits HTTP status semantics, per-request accounting, and payment rails. Folded from send-spine-protocol-family (grammar-forward, run lexr4).","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":7,"promiseEdges":7},"claim":{"type":"gate","clause":"Serve","condition":"Paid"},"grandfathered":false},{"census":"LEXPVM-T-055","term":"MyTerms (IEEE 7012-2025)","register":"glossary · conjectured expression of standard","cites":"glossary-master-v4 § ### MyTerms (IEEE 7012-2025)","lex":"LEX MyTerms Agreement.\r\n\r\n\"Person\" is a person.\r\n\"Counterparty\" is a person.\r\n\"Swordsman\" is a person.\r\n\"Purpose\" is a text.\r\n\"Breach\" is a binary.\r\n\r\nThe Person fixes the Purpose, appoints the Counterparty,\r\nand appoints the Swordsman.\r\n\r\nCLAUSE: Accept Terms.\r\nThe Counterparty may certify the Purpose.\r\n\r\nCLAUSE: Examine for Breach.\r\nThe Swordsman may declare Breach.\r\n\r\nCLAUSE: Dissolve.\r\nThe Person may, if Breach is declared, terminate this contract.","notes":"the HENNING_BRIEF probe (i) sketch, gate-repaired 2026-07-10; carries person-proffers, counterparty-accepts (the invitation pattern), Swordsman in the deterministic breach seat; omits negotiation and per-jurisdiction variation.","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-056","term":"ERC-8004","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### ERC-8004","lex":"LEX ERC Agent Identity Standard.\n\n\"First Person\" is a person.\n\"Agent\" is a person.\n\"Identity Record\" is data.\n\"Identity Verified\" is a binary.\n\nThe First Person appoints the Agent.\n\nCLAUSE: Attest.\nThe Agent may register the Identity Record.\n\nCLAUSE: Verify.\nThe First Person may declare Identity Verified.\n\nCLAUSE: Recognize.\nThe First Person may, if Identity Verified is declared: certify the Identity Record.","notes":"gate: the Recognize clause is reachable only under the Identity Verified condition. Omissions per the term's canon anchor. Assayer-authored (sovereignty-cluster-charter held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":4,"clauses":3,"sentences":4,"triples":4,"promiseEdges":4},"claim":{"type":"gate","clause":"Recognize","condition":"Identity Verified"},"grandfathered":false},{"census":"LEXPVM-T-057","term":"ERC-7812","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### ERC-7812","lex":"LEX ERC Identity Commitment.\n\n\"Prover\" is a person.\n\"Verifier\" is a person.\n\"Identity\" is an amount.\n\"Identity Proof\" is a text.\n\nThe Prover appoints the Verifier, and fixes the Identity.\n\nCLAUSE: Prove.\nThe Prover may fix the Identity Proof, and afterwards send the Identity Proof to the Verifier.","notes":"zero-knowledge shape as an absence: the proof travels to the verifier, the identity itself has no route anywhere (impossibility as the missing clause); ordering = fix the proof, afterwards send it. Omits the ERC mechanics and commitment scheme. Assayer-authored (pt-primitive-polarity-charter held-out, recipe-only); keystone Notes.","counts":{"definitions":4,"clauses":1,"sentences":2,"triples":4,"promiseEdges":4},"claim":{"type":"absence","to":"Verifier","what":"Identity"},"grandfathered":false},{"census":"LEXPVM-T-058","term":"Agent (IEEE 7012)","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Agent (IEEE 7012)","lex":"LEX Agent.\n\n\"Principal\" is a person.\n\"Agent\" is a person.\n\"Entity\" is a person.\n\"Proposed Terms\" is a text.\n\"Mandate Time\" is a time.\n\"Mandate Given\" is a binary.\n\nThe Principal appoints the Agent, appoints the Entity, and fixes the Proposed Terms.\n\nCLAUSE: Authorize.\nThe Principal may declare Mandate Given.\n\nCLAUSE: Mark Mandate.\nThe Agent may, if Mandate Given is declared, fix the Mandate Time as the current time.\n\nCLAUSE: Present.\nThe Agent may, if the Mandate Time is fixed: send the Proposed Terms to the Entity.","notes":"agency as a phase law: the agent presents terms only after the mandate time is fixed, and the mandate time is fixable only after Mandate Given stands declared (delegation before action, as clause ordering). Omits the IEEE 7012 role taxonomy. Assayer-authored (temporal-spine-lifecycle-charter held-out, recipe-only); keystone Notes.","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":{"type":"gate","clause":"Present","condition":"Mandate Time"},"grandfathered":false},{"census":"LEXPVM-T-059","term":"Agreement (IEEE 7012)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Agreement (IEEE 7012)","lex":"LEX Agreement.\n\n\"First Party\" is a person.\n\"Second Party\" is a person.\n\"Purpose Term\" is a text.\n\"Retention Term\" is a text.\n\"Agreement\" is a text.\n\nThe First Party appoints the Second Party, fixes the Purpose Term, fixes the Retention Term, and fixes the Agreement.\n\nCLAUSE: Compound.\n\"Complete\" is defined as: the Purpose Term is fixed and the Retention Term is fixed.\n\nCLAUSE: Offer.\nThe First Party may, if this Agreement is Complete: send the Agreement to the Second Party.","notes":"Structural: compoundness as conjunction (the defined predicate Complete requires BOTH the Purpose Term AND the Retention Term fixed; the mutation twin drops one term clause and the offer warrant survives on a fragment that is no longer a compound set), plus the proposed-and-offered-before-a-contract posture carried by gating Offer on Complete. Omits: the open-ended plurality of term clauses (two stand for the set) and the formal-contract successor step, which lives in T-060. Folded from myterms-agreement-family (canon-forward, run lexr4).","counts":{"definitions":5,"clauses":2,"sentences":2,"triples":5,"promiseEdges":5},"claim":{"type":"conjunction","predicate":"Complete","conjuncts":["Purpose Term","Retention Term"]},"grandfathered":false},{"census":"LEXPVM-T-060","term":"Contract (IEEE 7012)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Contract (IEEE 7012)","lex":"LEX Contract.\n\n\"First Party\" is a person.\n\"Second Party\" is a person.\n\"Agreement\" is a text.\n\"Contract Record\" is data.\n\"First Assent\" is a binary.\n\"Second Assent\" is a binary.\n\nThe First Party appoints the Second Party, and fixes the Agreement.\n\nCLAUSE: Assent Of The First Party.\nThe First Party may declare First Assent.\n\nCLAUSE: Assent Of The Second Party.\nThe Second Party may declare Second Assent.\n\nCLAUSE: Mutuality.\n\"Mutual\" is defined as: First Assent is declared and Second Assent is declared.\n\nCLAUSE: Bind.\nThe First Party may, if this Agreement is Mutual: certify the Agreement, and afterwards register the Contract Record.","notes":"Structural: agreement-precedes-contract as ordering (the Bind clause certifies the Agreement first and only afterwards registers the Contract Record; the mutation twin registers the record before certifying what it records), with mutuality carried by the defined predicate Mutual requiring both parties' declared assent and each assent declared only by its own party (autonomy). Omits: enforceable-by-law externality (no court is modeled) and the chronicle-system detail of the 0xagentprivacy mapping. Folded from myterms-agreement-family (canon-forward, run lexr4).","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":6,"promiseEdges":6},"claim":{"type":"ordering","clause":"Bind","sequence":["certify:Agreement","register:Contract Record"]},"grandfathered":false},{"census":"LEXPVM-T-061","term":"Entity (IEEE 7012)","register":"glossary · conjectured expression of standard","cites":"glossary-master-v4 § ### Entity (IEEE 7012)","lex":"LEX Entity.\n\n\"Person\" is a person.\n\"Entity\" is a person.\n\"Registrar\" is a person.\n\"Agreement Record\" is a text.\n\"Organization Confirmed\" is a binary.\n\nThe Person appoints the Entity, appoints the Registrar, and fixes the Agreement Record.\n\nCLAUSE: Confirm Organization.\nThe Registrar may declare Organization Confirmed.\n\nCLAUSE: Conclude.\nThe Person may, if Organization Confirmed is declared: send the Agreement Record to the Entity.","notes":"Carries entity-hood as a prerequisite gate: the only clause that concludes an agreement with the Entity (the send of the Agreement Record) is conditional on Organization Confirmed (the relation claim), so contracting with an unconfirmed entity is structurally unreachable. Omits the negative half (never an individual) as a typed distinction, since person is the subset's only agent type, and omits organizational form detail. Anchor: ### Entity (IEEE 7012). Folded from ieee7012-standards-family (canon-forward, run lexr4).","counts":{"definitions":5,"clauses":2,"sentences":3,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Conclude","condition":"Organization Confirmed"},"grandfathered":false},{"census":"LEXPVM-T-062","term":"First Party (IEEE 7012)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### First Party (IEEE 7012)","lex":"LEX First Party.\n\n\"First Party\" is a person.\n\"Entity\" is a person.\n\"Terms\" is a text.\n\"Proffered\" is a binary.\n\"Acceptance\" is a binary.\n\nThe First Party appoints the Entity, and fixes the Terms.\n\nCLAUSE: Proffer.\nThe First Party may send the Terms to the Entity, and declare Proffered.\n\nCLAUSE: Accept.\nThe Entity may, if Proffered is declared, declare Acceptance.","notes":"Structural: consent-first direction as gate (the Entity's Acceptance fires only after the individual's declared Proffered; the mutation twin strips the gate so acceptance can precede any proffered terms, exactly the imposition shape the canon rejects). The individual is the origin of terms: the Proffer clause sends the Terms outward and only the First Party fixes them. Omits: always-a-person-never-an-organization typing (the Lexon person type cannot distinguish individuals from organizations) and the First Person dignity framing of the mapping. Folded from myterms-agreement-family (canon-forward, run lexr4).","counts":{"definitions":5,"clauses":2,"sentences":3,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Accept","condition":"Proffered"},"grandfathered":false},{"census":"LEXPVM-T-063","term":"Second Party (IEEE 7012)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Second Party (IEEE 7012)","lex":"LEX Second Party.\n\n\"First Party\" is a person.\n\"Second Party\" is a person.\n\"Terms\" is a text.\n\"Terms Accepted\" is a binary.\n\"Service\" is a text.\n\nThe First Party appoints the Second Party, and fixes the Terms.\n\nCLAUSE: Receive.\nThe First Party may send the Terms to the Second Party.\n\nCLAUSE: Accept.\nThe Second Party may declare Terms Accepted.\n\nCLAUSE: Serve.\nThe Second Party may, if Terms Accepted is declared, register the Service.","notes":"Structural: exchange gated on accepted terms (the Serve clause registers the Service only under the entity's own declared Terms Accepted, so the service provider acts only inside the individual's proffered agreement; the ungated mutation twin serves without acceptance, the surveillance default), with the receive-accept-serve lifecycle laid out as separate clauses. Omits: always-an-organization typing (one Lexon person type) and service-provider or platform taxonomy. Folded from myterms-agreement-family (canon-forward, run lexr4).","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Serve","condition":"Terms Accepted"},"grandfathered":false},{"census":"LEXPVM-T-064","term":"Proposer (IEEE 7012)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Proposer (IEEE 7012)","lex":"LEX Proposer.\n\n\"Proposer\" is a person.\n\"Recipient\" is a person.\n\"Proposed Terms\" is a text.\n\nThe Proposer appoints the Recipient.\n\nCLAUSE: Advance.\nThe Proposer may fix the Proposed Terms, and afterwards send the Proposed Terms to the Recipient.","notes":"Structural: advancing terms as ordering (the Advance clause fixes the Proposed Terms and only afterwards sends them to the Recipient; the reversed mutation twin advances terms that do not yet exist, advancing nothing), and voluntariness as the modal may (the advance is a promise, never an imposition). Omits: the person-or-entity recipient distinction (one Recipient role stands for both) and the acting-through-Swordsman detail of the 0xagentprivacy mapping, which names a role this census term's definition does not. Folded from myterms-agreement-family (canon-forward, run lexr4).","counts":{"definitions":3,"clauses":1,"sentences":2,"triples":3,"promiseEdges":3},"claim":{"type":"ordering","clause":"Advance","sequence":["fix:Proposed Terms","send:Proposed Terms"]},"grandfathered":false},{"census":"LEXPVM-T-065","term":"DPV (Data Privacy Vocabulary)","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### DPV (Data Privacy Vocabulary)","lex":"LEX Data Privacy Vocabulary.\n\n\"Standards Body\" is a person.\n\"Processor\" is a person.\n\"Reviewer\" is a person.\n\"Vocabulary\" is a text.\n\"Processing Description\" is a text.\n\"Agreement\" is a text.\n\"Description Conformant\" is a binary.\n\nThe Standards Body registers the Vocabulary.\n\nCLAUSE: Describe.\nThe Processor may file the Processing Description.\n\nCLAUSE: Review.\nThe Reviewer may, if Processing Description is filed: declare Description Conformant.\n\nCLAUSE: Express Agreement.\nThe Processor may, if Description Conformant is declared: register the Agreement.","notes":"agreement expressible only under a conformant description: the express-agreement clause is gated on declared conformance, consent-follows-description as clause order. Omits the description schema. Assayer-authored (promise-bundle-spell held-out, recipe-only); keystone Notes.","counts":{"definitions":7,"clauses":3,"sentences":4,"triples":4,"promiseEdges":4},"claim":{"type":"gate","clause":"Express Agreement","condition":"Description Conformant"},"grandfathered":false},{"census":"LEXPVM-T-066","term":"Machine-readable (IEEE 7012)","register":"glossary · conjectured expression of standard","cites":"glossary-master-v4 § ### Machine-readable (IEEE 7012)","lex":"LEX Machine Readable Terms.\n\n\"Author\" is a person.\n\"Processor\" is a person.\n\"Terms\" is a text.\n\"Encoding\" is data.\n\"Encoded\" is a binary.\n\nThe Author appoints the Processor, and fixes the Terms.\n\nCLAUSE: Encode.\nThe Author may file the Encoding.\n\nCLAUSE: Mark Encoded.\nThe Author may, if the Encoding is filed: declare Encoded.\n\nCLAUSE: Process.\nThe Processor may, if Encoded is declared: certify the Terms.","notes":"Carries machine-readability as a gate chain: the Encoding artifact must be filed before Encoded can be declared, and the Processor's certify of the Terms is conditional on Encoded (the relation claim), so computer processing of unencoded terms is structurally unreachable, an encode-then-mark-then-process ordering carried by two stacked gates. Omits the concrete formats (JSON-LD, RDF/Turtle, HTTP headers, bitwise encoding). Anchor: ### Machine-readable (IEEE 7012). Folded from ieee7012-standards-family (canon-forward, run lexr4).","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Process","condition":"Encoded"},"grandfathered":false},{"census":"LEXPVM-T-067","term":"Agreement Taxonomy (IEEE 7012)","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Agreement Taxonomy (IEEE 7012)","lex":"LEX Agreement Taxonomy.\n\n\"Principal\" is a person.\n\"Entity\" is a person.\n\"Base Agreement\" is a text.\n\"Escalation\" is a text.\n\"Selection Time\" is a time.\n\"Base Chosen\" is a binary.\n\nThe Principal appoints the Entity, and fixes the Base Agreement.\n\nCLAUSE: Choose Base.\nThe Principal may declare Base Chosen.\n\nCLAUSE: Mark Selection.\nThe Principal may ovenant.\n\n\"Covenant Inscribed\" is defined as: Personhood is declared and Ownership is declared and Privacy is declared and Information Flow is declared and Capital Flow is declared and Capital Service is declared and Security is declared and Accountability is declared and Earth Goods is declared and Resilience is declared.\n\nCLAUSE: Inscribe.\nThe First Person may declare Personhood, declare Ownership, declare Privacy, declare Information Flow, declare Capital Flow, declare Capital Service, declare Security, declare Accountability, declare Earth Goods, and declare Resilience.\n\nCLAUSE: Pass Threshold.\nThe First Person may declare Threshold Passed.\n\nCLAUSE: Carry Forward.\nThe First Person may, if Threshold Passed is declared, register the Copy.","notes":"conjunction: Covenant Inscribed is defined as all ten canon principles declared, so any missing principle breaks the definition (the mutated twin drops Personhood and fails the claim); the Carry Forward gate on Threshold Passed carries the key proverb's structure, copies travel only with those who passed the threshold; omits the Infinite Vault staging and the proverb's wording; zero-party section, First Person holds per the universal cast rule. Folded from lexr5.2:zero-party-universal-cast-charter (run lexr5).","counts":{"definitions":14,"clauses":3,"sentences":4,"triples":13,"promiseEdges":13},"claim":{"conjuncts":["Personhood","Ownership","Privacy","Information Flow","Capital Flow","Capital Service","Security","Accountability","Earth Goods","Resilience"],"predicate":"Covenant Inscribed","type":"conjunction"},"grandfathered":false},{"census":"LEXPVM-T-088","term":"Yggdrasil","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Yggdrasil","lex":"LEX Yggdrasil.\n\n\"Swordsman\" is a person.\n\"First Person\" is a person.\n\"Specific Reality\" is a text.\n\"Measurement Taken\" is a binary.\n\nThe Swordsman appoints the First Person, and fixes the Specific Reality.

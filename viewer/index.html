t and Connect declares gated on Protect and Project declares; only the Surveyor holds declare clauses. Omits the separation matrix determinant form and stratum arithmetic. Assayer-authored (formula-skeleton-charter held-out, recipe-only).","counts":{"definitions":8,"clauses":6,"sentences":6,"triples":7,"promiseEdges":7},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-090","term":"Four Forces (Protect, Project, Reflect, Connect)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Four Forces (Protect, Project, Reflect, Connect)","lex":"LEX Four Forces.\r\n\r\n\"First Person\" is a person.\r\n\"Swordsman\" is a person.\r\n\"Mage\" is a person.\r\n\"Witness\" is a person.\r\n\"Bridge\" is a person.\r\n\"Force Model\" is this contract.\r\n\"Memory Record\" is a text.\r\n\"Network Record\" is a text.\r\n\"Boundary Drawn\" is a binary.\r\n\"Delegation Cast\" is a binary.\r\n\"Separation Held\" is a binary.\r\n\r\nThe First Person appoints the Swordsman, appoints the Mage, appoints the Witness, and appoints the Bridge.\r\n\r\nCLAUSE: Draw Boundary.\r\nThe Swordsman may declare Boundary Drawn.\r\n\r\nCLAUSE: Cast Delegation.\r\nThe Mage may declare Delegation Cast.\r\n\r\nCLAUSE: Hold Separation.\r\nThe First Person may declare Separation Held.\r\n\r\nCLAUSE: Fourfold.\r\n\"Fourfold\" is defined as: Boundary Drawn is declared and Delegation Cast is declared and Separation Held is declared.\r\n\r\nCLAUSE: Reflect.\r\nThe Witness may, if this Force Model is Fourfold: register the Memory Record.\r\n\r\nCLAUSE: Connect.\r\nThe Bridge may, if this Force Model is Fourfold: register the Network Record.","notes":"four forces as four roles: protect and project are agent declarations, reflect and connect are registrations gated on the Fourfold conjunction; omits the force-to-capital mapping.","counts":{"definitions":11,"clauses":6,"sentences":6,"triples":9,"promiseEdges":9},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-091","term":"Privacy Value Model (PVM)","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### Privacy Value Model (PVM)","lex":"LEX Privacy Value Model.\n\n\"First Person\" is a person.\n\"Assessor\" is a person.\n\"Model\" is this contract.\n\"Privacy Value\" is an amount.\n\"Protection Present\" is a binary.\n\"Coordination Present\" is a binary.\n\"Quality Present\" is a binary.\n\"Separation Present\" is a binary.\n\nThe First Person appoints the Assessor, and fixes the Privacy Value.\n\nCLAUSE: Assess Protection.\nThe Assessor may declare Protection Present.\n\nCLAUSE: Assess Coordination.\nThe Assessor may declare Coordination Present.\n\nCLAUSE: Assess Quality.\nThe Assessor may declare Quality Present.\n\nCLAUSE: Assess Separation.\nThe Assessor may declare Separation Present.\n\nCLAUSE: Valuable.\n\"Valuable\" is defined as: Protection Present is declared and Coordination Present is declared and Quality Present is declared and Separation Present is declared.\n\nCLAUSE: Release Value.\nThe Assessor may, if this Model is Valuable: certify the Privacy Value.","notes":"Carries the multiplicative any-zero-collapses composition as a four-factor conjunction defined predicate (Valuable) that is the only route to certifying the Privacy Value: one undeclared factor makes release structurally unreachable, the zero-collapse as clause topology. Omits the exponent on protection, temporal decay, network, guild, compression, market and path-integral factors, and all numeric calibration. Anchor: ### Privacy Value Model (PVM). Checker: GATE PASS (runs/lexr2/propose-scratch/t091_pvm.lex). Folded from formula-skeleton-charter (canon-forward, run lexr2).","counts":{"definitions":8,"clauses":6,"sentences":6,"triples":7,"promiseEdges":7},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-092","term":"Separation Matrix (Σ), Agent Layer","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### Separation Matrix (Σ), Agent Layer","lex":"LEX Separation Matrix.\n\n\"First Person\" is a person.\n\"Auditor\" is a person.\n\"Gap\" is a person.\n\"Architectural Volume\" is an amount.\n\"Sword Mage Entanglement\" is an amount.\n\"Reflect Connect Entanglement\" is an amount.\n\"Entanglement Measured\" is a binary.\n\"Pair Collapsed\" is a binary.\n\"Volume Collapsed\" is a binary.\n\nThe First Person pays the Architectural Volume into escrow, appoints the Auditor, appoints the Gap, fixes the Sword Mage Entanglement, and fixes the Reflect Connect Entanglement.\n\nCLAUSE: Measure.\nThe Auditor may declare Entanglement Measured.\n\nCLAUSE: Drain Sword Mage Pair.\nThe Auditor may, if Entanglement Measured is declared: pay from escrow the Sword Mage Entanglement to the Gap.\n\nCLAUSE: Drain Reflect Connect Pair.\nThe Auditor may, if Entanglement Measured is declared: pay from escrow the Reflect Connect Entanglement to the Gap.\n\nCLAUSE: Collapse Pair.\nThe Auditor may declare Pair Collapsed.\n\nCLAUSE: Concede Collapse.\nThe First Person must, if Pair Collapsed is declared: declare Volume Collapsed.\n\nCLAUSE: Retain Volume.\nThe First Person may, if Entanglement Measured is declared: return the remainder of the escrow to the First Person.","notes":"conservation carried as pairwise entanglement drains plus the retained remainder exhausting the escrowed architectural volume; unavoidable consequence as a must clause (any pair collapse forces volume collapse, the multiplicative zero); impossibility as absence (no clause routes volume to the Auditor). Omits the four-by-four matrix entries and the determinant. Assayer-authored (escrow-conservation-charter held-out, recipe-only).","counts":{"definitions":9,"clauses":6,"sentences":7,"triples":11,"promiseEdges":11},"claim":{"type":"gate","clause":"Retain Volume","condition":"Entanglement Measured"},"grandfathered":false},{"census":"LEXPVM-T-093","term":"Three-Axis Separation (V5)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Three-Axis Separation (V5)","lex":"LEX Three Axis Separation Charter.\n\n\"Verifier\" is a person.\n\"Operator\" is a person.\n\"Separation Record\" is this contract.\n\"Agent Axis\" is a binary.\n\"Data Axis\" is a binary.\n\"Inference Axis\" is a binary.\n\nThe Verifier appoints the Operator.\n\nCLAUSE: Hold.\nThe Operator may declare Agent Axis.\nThe Operator may declare Data Axis.\nThe Operator may declare Inference Axis.\n\nCLAUSE: Separated.\n\"Separated\" is defined as: Agent Axis is declared and Data Axis is declared and Inference Axis is declared.\n\nCLAUSE: Attest.\nThe Verifier may, if this Separation Record is Separated: certify the Separation Record.","notes":"conjunction: the defined predicate Separated requires all of Agent Axis AND Data Axis AND Inference Axis. Omissions per the term's canon anchor. Assayer-authored (consent-standard-party-charter held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":6,"clauses":3,"sentences":5,"triples":5,"promiseEdges":5},"claim":{"type":"conjunction","predicate":"Separated","conjuncts":["Agent Axis","Data Axis","Inference Axis"]},"grandfathered":false},{"census":"LEXPVM-T-094","term":"Φ_agent (Agent-Layer Separation)","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### Φ_agent (Agent-Layer Separation)","lex":"LEX Agent Layer Separation.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Gap\" is a person.\n\"Separation Value\" is an amount.\n\"Entanglement Penalty\" is an amount.\n\"Imbalance Penalty\" is an amount.\n\"Balance Audited\" is a binary.\n\"Entanglement Found\" is a binary.\n\"Imbalance Found\" is a binary.\n\nThe First Person pays the Separation Value into escrow, appoints the Swordsman, appoints the Mage, appoints the Gap, fixes the Entanglement Penalty, and fixes the Imbalance Penalty.\n\nCLAUSE: Audit Balance.\nThe Gap may declare Balance Audited.\n\nCLAUSE: Find Entanglement.\nThe Gap may declare Entanglement Found.\n\nCLAUSE: Charge Entanglement.\nThe Gap may, if Entanglement Found is declared: pay from escrow the Entanglement Penalty to themselves.\n\nCLAUSE: Find Imbalance.\nThe Gap may declare Imbalance Found.\n\nCLAUSE: Charge Imbalance.\nThe Gap may, if Imbalance Found is declared: pay from escrow the Imbalance Penalty to themselves.\n\nCLAUSE: Retain Separation.\nThe First Person may, if Balance Audited is declared: return the remainder of the escrow to the First Person.","notes":"ceiling as conservation (the retained separation value can never exceed the escrowed whole, the min cap); multiplicative dampening as conditional drains (entanglement and imbalance penalties shrink the remainder); impossibility as absence (no clause pays the Swordsman or the Mage any separation value). Omits the ratio formula and the determinant. Assayer-authored (escrow-conservation-charter held-out, recipe-only).","counts":{"definitions":10,"clauses":6,"sentences":7,"triples":12,"promiseEdges":12},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-095","term":"Φ_data (Data-Layer Separation)","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### Φ_data (Data-Layer Separation)","lex":"LEX Data Layer Separation.\n\n\"First Person\" is a person.\n\"First Provider\" is a person.\n\"Second Provider\" is a person.\n\"Data Corpus\" is an amount.\n\"First Shard\" is an amount.\n\"Second Shard\" is an amount.\n\"Separation\" is this contract.\n\"First Shard Placed\" is a binary.\n\"Second Shard Placed\" is a binary.\n\nThe First Person pays the Data Corpus into escrow, appoints the First Provider, appoints the Second Provider, fixes the First Shard, and fixes the Second Shard.\n\nCLAUSE: Place First Shard.\nThe First Person may pay from escrow the First Shard to the First Provider, and afterwards declare First Shard Placed.\n\nCLAUSE: Place Second Shard.\nThe First Person may pay from escrow the Second Shard to the Second Provider, and afterwards declare Second Shard Placed.\n\nCLAUSE: Fragmented.\n\"Fragmented\" is defined as: First Shard Placed is declared and Second Shard Placed is declared.\n\nCLAUSE: Hold Residue.\nThe First Person may, if this Separation is Fragmented: return the remainder of the escrow to the First Person.","notes":"fragmentation carried as two shard outflows each with an afterwards declaration (ordering); the Fragmented defined conjunction gates holding the residue; conservation = shards plus retained residue exhaust the escrowed corpus. Omits the separation formula and provider counts. Assayer-authored (escrow-conservation-recipe held-out, recipe-only).","counts":{"definitions":9,"clauses":4,"sentences":4,"triples":10,"promiseEdges":10},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-096","term":"Φ_inference (Inference-Layer Separation)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Φ_inference (Inference-Layer Separation)","lex":"LEX Inference Layer Separation.\n\n\"Generator\" is a person.\n\"Solver\" is a person.\n\"Reasoning Graph\" is a text.\n\"Execution\" is data.\n\"Shared Weights\" is an amount.\n\"Graph Filed\" is a binary.\n\nThe Generator appoints the Solver.\n\nCLAUSE: Reason.\nThe Generator may file the Reasoning Graph, and afterwards declare Graph Filed.\n\nCLAUSE: Execute.\nThe Solver may, if Graph Filed is declared, register the Execution.","notes":"impossibility as absence: no transfer clause routes Shared Weights to the Solver. Omissions per the term's canon anchor. Assayer-authored (invitation-admission-charter held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":6,"clauses":2,"sentences":3,"triples":4,"promiseEdges":4},"claim":{"type":"absence","to":"Solver","what":"Shared Weights"},"grandfathered":false},{"census":"LEXPVM-T-097","term":"Duality Function Φ(Σ), See Φ_agent","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Duality Function Φ(Σ), See Φ_agent","lex":"LEX Duality Function.\n\n\"First Person\" is a person.\n\"Agent Axis\" is data.\n\"Axis Count\" is a number, initially 3.\n\"Separation\" is a text.\n\"Duality\" is this contract.\n\nThe First Person fixes the Agent Axis.\n\nCLAUSE: Duality Preserved.\n\"Duality Preserved\" is defined as: the Agent Axis is fixed and the Axis Count is greater than zero.\n\nCLAUSE: Certify Separation.\nThe First Person may, if this Duality is Duality Preserved: certify the Separation.","notes":"conjunction: Duality Preserved requires all of Agent Axis AND Axis Count. Omissions per the term canon anchor. Assayer-authored held-out, recipe-only (run lexr5); keystone Notes.","counts":{"definitions":5,"clauses":2,"sentences":2,"triples":2,"promiseEdges":2},"claim":{"type":"conjunction","predicate":"Duality Preserved","conjuncts":["Agent Axis","Axis Count"]},"grandfathered":false},{"census":"LEXPVM-T-098","term":"Edge Value T(π) → Path Integral T_∫(π) (V5)","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### Edge Value T(π) → Path Integral T_∫(π) (V5)","lex":"LEX Path Integral.\n\n\"Traveler\" is a person.\n\"Verifier\" is a person.\n\"Path\" is this contract.\n\"Early Edge Value\" is an amount.\n\"Late Edge Value\" is an amount.\n\"Trajectory Value\" is an amount.\n\"Checkpoint Verified\" is a binary.\n\nThe Verifier appoints the Traveler, fixes the Early Edge Value, fixes the Late Edge Value, and fixes the Trajectory Value.\n\nCLAUSE: Traverse Early.\nThe Traveler may pay the Early Edge Value into escrow.\n\nCLAUSE: Verify Checkpoint.\nThe Verifier may declare Checkpoint Verified.\n\nCLAUSE: Traverse Late.\nThe Traveler may, if Checkpoint Verified is declared: pay the Late Edge Value into escrow.\n\nCLAUSE: Integrated.\n\"Integrated\" is defined as: the Early Edge Value is fixed and the Late Edge Value is fixed and Checkpoint Verified is declared.\n\nCLAUSE: Certify Trajectory.\nThe Verifier may, if this Path is Integrated: certify the Trajectory Value, and pay from escrow the Trajectory Value to the Traveler.","notes":"checkpoint-gates-later-traversal ordering carried as the Late Edge inflow reachable only after the Verifier Checkpoint Verified declaration (edge non-independence as gating); accumulation as escrow conservation; the Integrated conjunction gates the only certify and outflow; the Traveler cannot verify its own checkpoint. Omits the integral form and the beta coefficient. Assayer-authored (formula-skeleton-charter held-out, recipe-only).","counts":{"definitions":7,"clauses":5,"sentences":5,"triples":9,"promiseEdges":9},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-099","term":"Path Integral T_∫(π) (V5)","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### Path Integral T_∫(π) (V5)","lex":"LEX Path Integral.\n\n\"Keeper\" is a person.\n\"Traveler\" is a person.\n\"Base Value\" is an amount.\n\"First Edge Contribution\" is an amount.\n\"Second Edge Contribution\" is an amount.\n\"Path\" is this contract.\n\"First Edge Walked\" is a binary.\n\"Second Edge Walked\" is a binary.\n\nThe Keeper appoints the Traveler, and fixes the Base Value.\n\nCLAUSE: Walk First Edge.\nThe Traveler may pay the First Edge Contribution into escrow, and afterwards declare First Edge Walked.\n\nCLAUSE: Walk Second Edge.\nThe Traveler may, if First Edge Walked is declared: pay the Second Edge Contribution into escrow, and afterwards declare Second Edge Walked.\n\nCLAUSE: Traversed.\n\"Traversed\" is defined as: First Edge Walked is declared and Second Edge Walked is declared.\n\nCLAUSE: Pay Path Value.\nThe Keeper may, if this Path is Traversed: pay the Base Value to the Traveler, and afterwards pay the remainder of the escrow to the Traveler.","notes":"Carries integration as ordered accumulation: each edge deposits a contribution into escrow and the second edge is gated on the first's declaration (path order as a condition chain, so a later contribution cannot precede an earlier one), and the payout equals the fixed Base Value plus the accumulated escrow, the one-plus-integral shape of the formula, firing only when the defined predicate Traversed conjoins both edge declarations. Omits beta, the density function F, non-local correlations beyond ordering, and continuous integration. Anchor: ### Path Integral T_∫(π) (V5). Folded from escrow-conservation-recipe (grammar-forward, run lexr2).","counts":{"definitions":8,"clauses":4,"sentences":4,"triples":8,"promiseEdges":8},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-101","term":"Temporal Memory A(τ) → Holonic Temporal Memory A_h(τ) (V5)","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### Temporal Memory A(τ) → Holonic Temporal Memory A_h(τ) (V5)","lex":"LEX Temporal Memory.\n\n\"First Person\" is a person.\n\"Verifier\" is a person.\n\"Gap\" is a person.\n\"Step Value\" is an amount.\n\"Integrity Discount\" is an amount.\n\"Persistence Discount\" is an amount.\n\"Step Verified\" is a binary.\n\"Proof Missing\" is a binary.\n\"Provider Failed\" is a binary.\n\"Holonic Persistence Established\" is a binary.\n\nThe First Person appoints the Verifier, appoints the Gap, fixes the Step Value, fixes the Integrity Discount, and fixes the Persistence Discount.\n\nCLAUSE: Verify Step.\nThe Verifier may declare Step Verified.\n\nCLAUSE: Accumulate.\nThe First Person may, if Step Verified is declared: pay the Step Value into escrow.\n\nCLAUSE: Flag Proof Gap.\nThe Verifier may declare Proof Missing.\n\nCLAUSE: Dampen Integrity.\nThe Verifier may, if Proof Missing is declared: pay from escrow the Integrity Discount to the Gap.\n\nCLAUSE: Flag Provider Failure.\nThe Verifier may declare Provider Failed.\n\nCLAUSE: Dampen Persistence.\nThe Verifier may, if Provider Failed is declared: pay from escrow the Persistence Discount to the Gap.\n\nCLAUSE: Establish Persistence.\nThe First Person may declare Holonic Persistence Established.\n\nCLAUSE: Retain Memory.\nThe First Person may, if Holonic Persistence Established is declared: return the remainder of the escrow to the First Person.","notes":"accumulation ordering (each deposit gated on a declared verified step); dampening as conditional drains (integrity and persistence discounts leave escrow only under their declared failure binaries); conservation = deposits equal drains plus retained remainder; holonic persistence as the gate on retaining the remainder. Omits the logarithmic formula and alpha. Assayer-authored (escrow-conservation-charter held-out, recipe-only).","counts":{"definitions":10,"clauses":8,"sentences":9,"triples":13,"promiseEdges":13},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-102","term":"Three Graphs Model","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Three Graphs Model","lex":"LEX Three Graphs Model.\n\n\"First Person\" is a person.\n\"Witness\" is a person.\n\"Knowledge Graph\" is a text.\n\"Promise Graph\" is a text.\n\"Trust Graph\" is a text.\n\"Knowledge Mapped\" is a binary.\n\"Promise Formed\" is a binary.\n\"Trust Emerged\" is a binary.\n\nThe First Person fixes the Knowledge Graph, fixes the Promise Graph, and fixes the Trust Graph.\n\nCLAUSE: Map Knowledge.\nThe First Person may declare Knowledge Mapped.\n\nCLAUSE: Form Promise.\nThe First Person or the Witness may declare Promise Formed.\n\nCLAUSE: Emerge Trust.\nThe Witness may declare Trust Emerged.\n\nCLAUSE: Overlap Standing.\n\"Overlap Standing\" is defined as:\nKnowledge Mapped is declared and Promise Formed is declared and Trust Emerged is declared.","notes":"conjunction: the defined predicate Overlap Standing requires all of Knowledge Mapped AND Promise Formed AND Trust Emerged. Omissions per the term's canon anchor. Assayer-authored (party-proffer-charter held-out, recipe-only, arity\" is defined as: the Nano Capacity is fixed and the Reasoning Graph is fixed and Parity Reached is declared.\n\nCLAUSE: Certify Parity.\nThe Evaluator may, if this Benchmark is Structured Parity: certify the Nano Capacity.","notes":"structured-reasoning parity carried as a defined conjunction (nano capacity fixed, reasoning graph fixed, parity declared) gating the only certify of the Nano Capacity; ordering = the parity comparison is reachable only after the reasoning graph is fixed. Omits benchmark scores and model sizes. Assayer-authored (quantity-gate-charter held-out, recipe-only); keystone Notes.","counts":{"definitions":7,"clauses":4,"sentences":4,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-113","term":"Generator (BRAID) (V5)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Generator (BRAID) (V5)","lex":"LEX Generator.\n\n\"Generator\" is a person.\n\"Solver\" is a person.\n\"Traversal Structure\" is a text.\n\"Reasoning Graph\" is a text.\n\"Braid\" is this contract.\n\nCLAUSE: Plan.\nThe Generator may fix the Traversal Structure, and then certify the Reasoning Graph.\n\nCLAUSE: Deliver.\nThe Generator may send the Reasoning Graph to the Solver.","notes":"ordering: clause Plan performs fix:Traversal Structure, then certify:Reasoning Graph as clause order. Omissions per the term canon anchor. Assayer-authored held-out, recipe-only (run lexr5); keystone Notes.","counts":{"definitions":5,"clauses":2,"sentences":2,"triples":3,"promiseEdges":3},"claim":{"type":"ordering","clause":"Plan","sequence":["fix:Traversal Structure","certify:Reasoning Graph"]},"grandfathered":false},{"census":"LEXPVM-T-116","term":"Holonic Architect (☯️🔷) (V5)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Holonic Architect (☯️🔷) (V5)","lex":"LEX Holonic Architect.\n\n\"First Person\" is a person.\n\"Holonic Architect\" is a person.\n\"Sword rum (V5)","lex":"LEX Compression Spectrum.\n\n\"First Person\" is a person.\n\"Experience\" is data.\n\"Memory\" is data.\n\"Knowledge\" is data.\n\"Understanding\" is data.\n\"Wisdom\" is data.\n\"Skill File\" is a text.\n\"Memory Ratio\" is a number, initially 10.\n\"Knowledge Ratio\" is a number, initially 100.\n\"Understanding Ratio\" is a number, initially 1000.\n\"Wisdom Ratio\" is a number, initially 10000.\n\"Spectrum\" is this contract.\n\nCLAUSE: Ascending.\n\"Ascending\" is defined as: the Knowledge Ratio is greater than the Memory Ratio and the Wisdom Ratio is greater than the Understanding Ratio.\n\nCLAUSE: Compress.\nThe First Person may fix the Experience, then fix the Memory, then fix the Knowledge, then fix the Understanding, then fix the Wisdom, and then certify the Skill File.\n\nCLAUSE: Publish.\nThe First Person may, if this Spectrum is Ascending: certify the Skill File.","notes":"carries the seven-layer spectrum as a strict ordering (the Compress clause fixes Experience then Memory then Knowledge then Understanding then Wisdom and only then certifies the Skill File, reversal-falsifiable) plus an Ascending conjunction over the attested ratio literals 10, 100, 1000, 10000; zero-actor canon section, First Person holder; omits the two variable-ratio layers as quantities (Reasoning Graph and Skill File carry no fixed ratio in canon, so none is invented) and the more-tokens-more-surveilable argument. Folded from lexr5.1:numeric-anchor-charter (run lexr5).","counts":{"definitions":12,"clauses":3,"sentences":2,"triples":7,"promiseEdges":7},"claim":{"clause":"Compress","sequence":["fix:Experience","fix:Memory","fix:Knowledge","fix:Understanding","fix:Wisdom","certify:Skill File"],"type":"ordering"},"grandfathered":false},{"census":"LEXPVM-T-122","term":"Stratum","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Stratum","lex":"LEX Stratum.\r\n\r\n\"Keeper\" is a person.\r\n\"Agent\" is a person.\r\n\"Placement\" is this contract.\r\n\"Sovereignty Address\" is a data.\r\n\"Stratum Level\" is an amount.\r\n\"Weight Counted\" is a binary.\r\n\r\nThe Keeper appoints the Agent, and fixes the Sovereignty Address.\r\n\r\nCLAUSE: Count Weight.\r\nThe Keeper may declare Weight Counted.\r\n\r\nCLAUSE: Set Level.\r\nThe Keeper may fix the Stratum Level.\r\n\r\nCLAUSE: Placed.\r\n\"Placed\" is defined as: the Sovereignty Address is fixed and Weight Counted is declared and the Stratum Level is fixed.\r\n\r\nCLAUSE: Certify Placement.\r\nThe Keeper may, if this Placement is Placed: certify the Stratum Level.","notes":"placement relation: stratum certification requires address fixed, weight counted, and level fixed together (Placed defined-as conjunction); omits the popcount weight formula.","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":5,"promiseEdges":5},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-123","term":"Stratum Weight (wᵢ)","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### Stratum Weight (wᵢ)","lex":"LEX Stratum Weight.\n\n\"Keeper\" is a person.\n\"Member\" is a person.\n\"Network Term\" is this contract.\n\"Stratum Weight\" is an amount.\n\"Contribution\" is an amount.\n\"Membership Verified\" is a binary.\n\nThe Keeper appoints the Member, and fixes the Stratum Weight.\n\nCLAUSE: Verify Membership.\nThe Keeper may declare Membership Verified.\n\nCLAUSE: Weighted.\n\"Weighted\" is defined as: the Stratum Weight is fixed and Membership Verified is declared.\n\nCLAUSE: Count Contribution.\nThe Member may, if this Network Term is Weighted: pay the Contribution into escrow.\n\nCLAUSE: Collect Sum.\nThe Keeper may pay from escrow the Contribution to themselves.","notes":"Carries weight-gates-counting: a member's Contribution enters the network sum (the escrow) only when the Stratum Weight is fixed and Membership Verified is declared (the Weighted conjunction), and the sum is collectable only from e r":"glossary · conjectured expression of convergent-preliminary term","cites":"glossary-master-v4 § ### Derivation Chain","lex":"LEX Derivation Chain.\n\n\"First Person\" is a person.\n\"Certificate\" is a text.\n\"Chain\" is data.\n\"Chain Identifier\" is a text.\n\"Endpoint\" is data.\n\nThe First Person fixes the Endpoint.\n\nCLAUSE: Derive.\nThe First Person may register a Certificate, and afterwards fix the Chain, and afterwards fix the Chain Identifier, and afterwards certify the Endpoint.","notes":"captures the chain as a single-officiant ordering: certificate registered, then the chain fixed, then the chain's own first-class identity fixed (the path is content-addressed too), then endpoint verification last; the section names no actor, so the First Person walks the chain (universal cast rule); omits path multiplicity (different chains reaching the one recital-fixed Endpoint) beyond the Endpoint's immutability. Folded from lexr5.1:cast-infrastructure-charter (run lexr5).","counts":{"definitions":5,"clauses":1,"sentences":2,"triples":5,"promiseEdges":5},"claim":{"clause":"Derive","sequence":["register:Certificate","fix:Chain","fix:Chain Identifier","certify:Endpoint"],"type":"ordering"},"grandfathered":false},{"census":"LEXPVM-T-126","term":"Toroidal Topology","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Toroidal Topology","lex":"LEX Toroidal Topology.\n\n\"First Person\" is a person.\n\"Path Count\" is a number.\n\"Enumeration Bound\" is a number.\n\"Verification\" is a text.\n\"Torus\" is this contract.\n\nCLAUSE: Wrapped.\n\"Wrapped\" is defined as: the Path Count is greater than the Enumeration Bound.\n\nCLAUSE: Verify.\nThe First Person may, if this Torus is Wrapped: certify the Verification.","notes":"gate: the Verify clause is reachable only under the Wrapped condition. Omissions per the term canon anchor. Assayer-authored held-out, recipe-only (run lexr5); keystone Notes.","counts":{"definitions":5,"clauses":2,"sentences":1,"triples":1,"promiseEdges":1},"claim":{"type":"gate","clause":"Verify","condition":"Wrapped"},"grandfathered":false},{"census":"LEXPVM-T-127","term":"Behavioural Density (ρ)","register":"glossary · conjectured expression of speculative term","cites":"glossary-master-v4 § ### Behavioural Density (ρ)","lex":"LEX Behavioural Density.\n\n\"First Person\" is a person.\n\"Lap Count\" is a number, initially 62.\n\"Shallow Count\" is a number, initially 13.\n\"Trajectory\" is data.\n\"Reconstruction Resistance\" is a text.\n\"Blade\" is this contract.\n\nThe First Person fixes the Trajectory.\n\nCLAUSE: Dense.\n\"Dense\" is defined as: the Lap Count is greater than the Shallow Count.\n\nCLAUSE: Resist.\nThe First Person may, if this Blade is Dense: certify the Reconstruction Resistance.","notes":"carries the density threshold as a gate (certifying Reconstruction Resistance is conditional on Dense, defined by the comparative Lap Count initially 62 greater than Shallow Count initially 13, the two attested blade depths from the canon's empirical basis); zero-actor canon section, First Person holder by the universal cast rule; omits the temporal-duration and intentional-transition terms of the density measure and the quantum-resistance amplification claim. Folded from lexr5.1:numeric-anchor-charter (run lexr5).","counts":{"definitions":6,"clauses":2,"sentences":2,"triples":2,"promiseEdges":2},"claim":{"clause":"Resist","condition":"Dense","type":"gate"},"grandfathered":false},{"census":"LEXPVM-T-128","term":"Betweenness Centrality","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Betweenness Centrality","lex":"LEX Betweenness Centrality.\n\n\"Source\" is a person.\n\"Target\" is a person.\n\"Gap\" is a person.\n\"Graph\" is this contract.\n\"Message\" is a text.\n\"Relay Received\" is a binary.\n\nThe Source appoints the Gap, appoints the Target, and fixes the Message.\n\nCLAUSE: Send To Gap.\nThe Source may send the Message to the Gap.\n\nCLAUSE: Receive.\nThe Gap may declare Relay Received.\n\nCLAUSE: On Path.\n\"On Path\" is defined as: the Message is fixed and Relay Received is declared.\n\nCLAUSE: Relay.\nThe Gap may, if this Graph is On Path: send the Message to the Target.","notes":"Carries maximal betweenness as only-route topology plus ordering: the sole clause that reaches the Target is held by the Gap and gated on the Gap's own Relay Received declaration (the On Path conjunction), and the Source has no direct send-to-Target clause, so every source-to-target path crosses the Gap, the node-on-all-shortest-paths property as clause-graph structure. Omits the shortest-path ratio formula and the counting algorithm. Anchor: ### Betweenness Centrality. Checker: GATE PASS (runs/lexr2/propose-scratch/t128_betweenness.lex). Folded from formula-skeleton-charter (canon-forward, run lexr2).","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-129","term":"Bilateral Witness (BW)","register":"glossary · conjectured expression of speculative term","cites":"glossary-master-v4 § ### Bilateral Witness (BW)","lex":"LEX Bilateral Witness.\n\n\"Witness Exchange\" is this contract.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Community\" is a person.\n\"Blade\" is data.\n\"Testimony\" is a text.\n\"Verified\" is a binary.\n\nThe Swordsman fixes the Blade, appoints the Mage, and appoints the Community.\n\nCLAUSE: Verify.\nThe Mage may certify the Blade, and afterwards declare Verified.\n\nCLAUSE: Testify.\nThe Mage may, if Verified is declared, send the Testimony to the Community.\n\nCLAUSE: Witnessed.\n\"Witnessed\" is defined as: Verified is declared and the Testimony is fixed.\n\nCLAUSE: Receive.\nThe Community may, if this Witness Exchange is Witnessed, certify the Testimony.","notes":"carries attestation without revelation as a conjunction (community reception requires BOTH private verification declared AND public testimony fixed, while no transfer clause routes the Blade itself to the Community); omits the quantum-resistance rationale and the demonstration date. Folded from send-spine-protocol-family (grammar-forward, run lexr4).","counts":{"definitions":7,"clauses":4,"sentences":4,"triples":7,"promiseEdges":7},"claim":{"type":"conjunction","predicate":"Witnessed","conjuncts":["Verified","Testimony"]},"grandfathered":false},{"census":"LEXPVM-T-130","term":"Blade Address","register":"glossary · conjectured expression of implemented term","cites":"glossary-master-v4 § ### Blade Address","lex":"LEX Blade Address.\n\n\"First Person\" is a person.\n\"Blade Address\" is a number, initially 0.\n\"Lattice\" is this contract.\n\"Sovereignty Claimed\" is a binary.\n\nThe First Person sets the Blade Address.\n\nCLAUSE: In Range.\n\"Address In Range\" is defined as: the Blade Address is not greater than 63 and the Blade Address is not less than zero.\n\nCLAUSE: Claim.\nThe First Person may, if this Lattice is Address In Range: declare Sovereignty Claimed.","notes":"Structural: conjunction: Address In Range is defined over BOTH numeric bounds (not greater than 63 and not less than zero), the 6-dimensional sovereignty state's 0 to 63 envelope carried as numeric-layer comparatives, and the sovereignty claim gates on the defined predicate. Universal cast rule applied: the section names no actor, so the First Person sets and claims. The initial literal 0 is the all-dormant address the glossary states. Omits the bit-weight encoding formula (d1 plus 2 times d2 plus 4 times d3 and so on), whose operators are out of subset. Checker: GATE PASS + RELATION PASS (runs/lexr5/lexr5.2/propose-scratch/t130_blade_address.lex). Folded from lexr5.2:cast-infrastructure-charter (run lexr5).","counts":{"definitions":4,"clauses":2,"sentences":2,"triples":2,"promiseEdges":2},"claim":{"conjuncts":["Blade Address is not greater than 63","Blade Address is not less than zero"],"predicate":"Address In Range","type":"conjunction"},"grandfathered":false},{"census":"LEXPVM-T-131","term":"Charge Level","register":"glossary · conjectured expression of implemented term","cites":"glossary-master-v4 § ### Charge Level","lex":"LEX Charge Level.\n\n\"Celebrant\" is a person.\n\"Witness\" is a person.\n\"Lap Charge\" is an amount.\n\"Charge Level\" is an amount.\n\"Lap Complete\" is a binary.\n\"Ceremony Closed\" is a binary.\n\nThe Celebrant appoints the Witness, fixes the Lap Charge, and fixes the Charge Level.\n\nCLAUSE: Run Lap.\nThe Celebrant may declare Lap Complete.\n\nCLAUSE: Accumulate.\nThe Celebrant may, if Lap Complete is declared: pay the Lap Charge into escrow.\n\nCLAUSE: Read Level.\nThe Witness may, if Lap Complete is declared: certify the Charge Level.\n\nCLAUSE: Close.\nThe Celebrant may declare Ceremony Closed.\n\nCLAUSE: Discharge.\nThe Witness may, if Ceremony Closed is declared: return the remainder of the escrow to the Celebrant.","notes":"Structural: accumulation ordering (each Lap Charge deposit is gated on a declared Lap Complete, so intensity grows only lap by lap, and the Witness certifies the Charge Level only once a lap stands declared) and close-gated discharge (the remainder returns to the Celebrant only after Ceremony Closed is declared, and no clause withdraws charge earlier). Omits the lap-count level table and numeric intensity values. Anchor: ### Charge Level. Folded from escrow-conservation-charter (grammar-forward, run lexr2).","counts":{"definitions":6,"clauses":5,"sentences":6,"triples":8,"promiseEdges":8},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-132","term":"21 Windows","register":"glossary · conjectured expression of documented term","cites":"glossary-master-v4 § ### 21 Windows","lex":"LEX Twenty One Windows.\n\n\"Forge Keeper\" is a person.\n\"Mage\" is a person.\n\"Swordsman\" is a person.\n\"Witness\" is a person.\n\"Window Inventory\" is an amount.\n\"Spell Windows\" is an amount.\n\"Forged Windows\" is an amount.\n\nThe Forge Keeper appoints the Mage, appoints the Swordsman, appoints the Witness, and pays the Window Inventory into escrow.\n\nCLAUSE: Allot.\nThe Forge Keeper may pay from escrow the Spell Windows to the Mage, and afterwards pay from escrow the Forged Windows to the Swordsman, and afterwards pay the remainder of the escrow to the Witness.","notes":"ordered partition carried as one afterwards chain (spell windows, then forged windows, then the remainder to the Witness); conservation = the three allotments exhaust the escrowed window inventory. Omits the numeric window counts. Assayer-authored (escrow-ledger-formula-charter held-out, recipe-only); keystone Notes.","counts":{"definitions":7,"clauses":1,"sentences":2,"triples":7,"promiseEdges":7},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-133","term":"Evoke Ceremony","register":"glossary · conjectured expression of documented term","cites":"glossary-master-v4 § ### Evoke Ceremony","lex":"LEX Evoke Ceremony.\n\n\"Practitioner\" is a person.\n\"Constellation\" is a text.\n\"Circuit\" is a text.\n\"Cast\" is a text.\n\"Trace\" is data.\n\"Blade Proof\" is data.\n\"Ceremony Complete\" is a binary.\n\nCLAUSE: Evoke.\nThe Practitioner may register the Constellation, and afterwards certify the Circuit, and afterwards register the Cast, and afterwards file the Trace, and afterwards declare Ceremony Complete, and afterwards register the Blade Proof.","notes":"carries the ceremony's canonical phase order as an ordering: the single Evoke clause performs Constellation, Circuit, Cast, Trace, Complete, Proof in exactly the attested sequence under one officiant, and the blade proof is generated last (proof follows tracing, never precedes it). Omits wandering-orb physics and knowledge-graph traversal detail. Folded from promise-bundle-spell (spell-grammar, run lexr3).","counts":{"definitions":7,"clauses":1,"sentences":1,"triples":6,"promiseEdges":6},"claim":{"type":"ordering","clause":"Evoke","sequence":["register:Constellation","certify:Circuit","register:Cast","file:Trace","declare:Ceremony Complete","register:Blade Proof"]},"grandfathered":false},{"census":"LEXPVM-T-134","term":"Constellation Path","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Constellation Path","lex":"LEX Constellation Path.\n\n\"Evoker\" is a person.\n\"Keeper\" is a person.\n\"First Node\" is a text.\n\"Second Node\" is a text.\n\"Path\" is a text.\n\"Inscribed\" is a binary.\n\nThe Evoker fixes the First Node, fixes the Second Node, and appoints the Keeper.\n\nCLAUSE: Traverse.\nThe Evoker may certify the First Node, and afterwards certify the Second Node, and afterwards register a Path.\n\nCLAUSE: Deliver.\nThe Evoker may, if the Path is fixed, send the Path to the Keeper.\n\nCLAUSE: Inscribe.\nThe Keeper may, if the Path is fixed, declare Inscribed.","notes":"ordering: clause Traverse performs certify:First Node, then certify:Second Node, then register:Path as clause order. Omissions per the term's canon anchor. Assayer-authored (send-spine-protocol-family held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":8,"promiseEdges":8},"claim":{"type":"ordering","clause":"Traverse","sequence":["certify:First Node","certify:Second Node","register:Path"]},"grandfathered":false},{"census":"LEXPVM-T-135","term":"Hexagram Encoding","register":"glossary · conjectured expression of documented term","cites":"glossary-master-v4 § ### Hexagram Encoding","lex":"LEX Hexagram Encoding.\n\n\"Mage\" is a person.\n\"Reader\" is a person.\n\"Line Weight\" is an amount.\n\"Hexagram\" is a text.\n\"Protection Line Set\" is a binary.\n\"Delegation Line Set\" is a binary.\n\"Memory Line Set\" is a binary.\n\"Connection Line Set\" is a binary.\n\"Computation Line Set\" is a binary.\n\"Value Line Set\" is a binary.\n\"Lines Complete\" is a binary.\n\nThe Mage appoints the Reader, and fixes the Line Weight.\n\nCLAUSE: Raise Protection Line.\nThe Mage may declare Protection Line Set.\n\nCLAUSE: Weigh Protection Line.\nThe Mage may, if Protection Line Set is declared: pay the Line Weight into escrow.\n\nCLAUSE: Raise Delegation Line.\nThe Mage may declare Delegation Line Set.\n\nCLAUSE: Weigh Delegation Line.\nThe Mage may, if Delegation Line Set is declared: pay the Line Weight into escrow.\n\nCLAUSE: Raise Memory Line.\nThe Mage may declare Memory Line Set.\n\nCLAUSE: Weigh Memory Line.\nThe Mage may, if Memory Line Set is declared: pay the Line Weight into escrow.\n\nCLAUSE: Raise Connection Line.\nThe Mage may declare Connection Line Set.\n\nCLAUSE: Weigh Connection Line.\nThe Mage may, if Connection Line Set is declared: pay the Line Weight into escrow.\n\nCLAUSE: Raise Computation Line.\nThe Mage may declare Computation Line Set.\n\nCLAUSE: Weigh Computation Line.\nThe Mage may, if Computation Line Set is declared: pay the Line Weight into escrow.\n\nCLAUSE: Raise Value Line.\nThe Mage may declare Value Line Set.\n\nCLAUSE: Weigh Value Line.\nThe Mage may, if Value Line Set is declared: pay the Line Weight into escrow.\n\nCLAUSE: Close Lines.\nThe Mage may declare Lines Complete.\n\nCLAUSE: Read Hexagram.\nThe Reader may, if Lines Complete is declared: register a Hexagram.\n\nCLAUSE: Discharge.\nThe Reader may, if Lines Complete is declared: return the remainder of the escrow to the Mage.","notes":"six-fold composition as one gated deposit per privacy-dimension line, accumulating in escrow; ordering = a line weighs in only after its line stands declared, and the Reader registers the Hexagram and discharges only after Lines Complete; conservation = the six line weights exhaust what returns to the Mage. Omits the sixty-four state count and the named blade mappings. Assayer-authored (escrow-conservation-charter held-out, recipe-only).","counts":{"definitions":11,"clauses":15,"sentences":16,"triples":17,"promiseEdges":17},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-136","term":"Mana Economy","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Mana Economy","lex":"LEX Mana Economy.\n\n\"Practitioner\" is a person.\n\"Registry\" is a person.\n\"Earned Mana\" is an amount.\n\"Inscription Cost\" is an amount.\n\"Inscription\" is a text.\n\"Practice Complete\" is a binary.\n\nThe Practitioner appoints the Registry, fixes the Earned Mana, and fixes the Inscription Cost.\n\nCLAUSE: Practice.\nThe Practitioner may declare Practice Complete.\n\nCLAUSE: Earn.\nThe Practitioner may, if Practice Complete is declared: pay the Earned Mana into escrow.\n\nCLAUSE: Inscribe.\nThe Practitioner may, if Practice Complete is declared: pay from escrow the Inscription Cost to the Registry, and afterwards register an Inscription.\n\nCLAUSE: Conserve.\nThe Practitioner may return the remainder of the escrow to the Practitioner.","notes":"Structural: earn-before-spend ordering (the deposit clause is gated on Practice Complete, and the Inscribe payout draws only from escrow, so spending presupposes earning), the pay-then-register afterwards chain (an Inscription registers only after its cost is paid), and non-transferability as absence (no clause sends or pays mana to any person except the Registry cost sink, and the remainder returns to the Practitioner alone). Omits numeric mana quantities, prices, and regeneration rates. Anchor: ### Mana Economy. Folded from escrow-conservation-charter (grammar-forward, run lexr2).","counts":{"definitions":6,"clauses":4,"sentences":5,"triples":8,"promiseEdges":8},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-137","term":"Mana Bridge","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Mana Bridge","lex":"LEX Mana Bridge.\n\n\"Extension Agent\" is a person.\n\"Territory Agent\" is a person.\n\"Mana Balance\" is an amount.\n\"Bridge\" is this contract.\n\"Home Territory Detected\" is a binary.\n\"Balance Read\" is a binary.\n\nThe Extension Agent pays the Mana Balance into escrow, and appoints the Territory Agent.\n\nCLAUSE: Detect Home Territory.\nThe Extension Agent may declare Home Territory Detected.\n\nCLAUSE: Read Balance.\nThe Extension Agent may, if Home Territory Detected is declared: declare Balance Read.\n\nCLAUSE: Synced.\n\"Synced\" is defined as: Home Territory Detected is declared and Balance Read is declared.\n\nCLAUSE: Sync Balance.\nThe Extension Agent must, if this Bridge is Synced: pay from escrow the Mana Balance to the Territory Agent.\n\nCLAUSE: Preserve Balance.\nThe Extension Agent may, if Balance Read is not declared: return the remainder of the escrow to the Extension Agent.","notes":"one-directional sync carried as a must clause (a synced bridge forces the balance to the Territory Agent); the Synced defined conjunction gates it; preservation = the remainder returns only while Balance Read stays undeclared (negated-condition guard). Omits mana magnitudes. Assayer-authored (escrow-conservation-recipe held-out, recipe-only); keystone Notes.","counts":{"definitions":6,"clauses":5,"sentences":5,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-139","term":"Inscription Reinforcement","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Inscription Reinforcement","lex":"LEX Inscription Reinforcement.\n\n\"Curator\" is a person.\n\"Keeper\" is a person.\n\"Inscription\" is this contract.\n\"Community Mark\" is a text.\n\"Reinforcement Time\" is a time.\n\"Mana Spent\" is a binary.\n\nThe Keeper appoints the Curator, and fixes the Community Mark.\n\nCLAUSE: Spend Mana.\nThe Curator may declare Mana Spent.\n\nCLAUSE: Reinforce.\nThe Curator may, if Mana Spent is declared, fix the Reinforcement Time as the current time.\n\nCLAUSE: Decay Period.\n\"Decay Period\" is defined as 30 days after the Reinforcement Time.\n\nCLAUSE: Decay.\nThe Keeper may, if the Decay Period has passed, terminate this Inscription.","notes":"Structural: gate (the Decay clause's terminate is reachable only once the defined Decay Period, 30 days after the Reinforcement Time, has passed) with an upstream gate (re-marking the Reinforcement Time is conditional on Mana Spent, so reinforcement costs mana and holds decay off). Omits the 0.5 mana price and reset arithmetic; the 30-day literal is the attested number form (days-after period and has-passed condition per lexon-example-statement). Checker: GATE PASS + RELATION PASS (runs/lexr3/lexr3.1/propose-scratch/t139_inscription_reinforcement.lex). Folded from temporal-spine-lifecycle-charter (grammar-forward, run lexr3).","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Decay","condition":"Decay Period"},"grandfathered":false},{"census":"LEXPVM-T-140","term":"Ceremony Channel","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Ceremony Channel","lex":"LEX Ceremony Channel.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Peer Identity\" is a text.\n\"Handshake\" is a text.\n\"Slash Message\" is a text.\n\"Inscribe Message\" is a text.\n\"Channel Open\" is a binary.\n\nThe First Person appoints the Swordsman, and appoints the Mage.\n\nCLAUSE: Discover.\nThe Swordsman may register the Peer Identity, and afterwards send the Handshake to the Mage.\n\nCLAUSE: Acknowledge.\nThe Mage may declare Channel Open.\n\nCLAUSE: Carry Slash.\nThe Swordsman may, if Channel Open is declared, send the Slash Message to the Mage.\n\nCLAUSE: Carry Inscribe.\nThe Mage may, if Channel Open is declared, send the Inscribe Message to the Swordsman.","notes":"captures the handshake-before-carriage structure: both directional message clauses (Swordsman to Mage, Mage to Swordsman, matching the section's two message-grammar directions) gate on the responding side's Channel Open declaration, and discovery is an ordered chain (peer identity stored, then handshake sent); omits the named message vocabulary, the position sync rate, and the two-second solo-operation timeout. Folded from lexr5.1:cast-infrastructure-charter (run lexr5).","counts":{"definitions":8,"clauses":4,"sentences":5,"triples":7,"promiseEdges":7},"claim":{"clause":"Carry Slash","condition":"Channel Open","type":"gate"},"grandfathered":false},{"census":"LEXPVM-T-141","term":"Ceremony Receiver","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Ceremony Receiver","lex":"LEX Ceremony Receiver.\n\n\"Receiver\" is a person.\n\"Sender\" is a person.\n\"Inscription\" is a text.\n\"Mana Cost\" is an amount.\n\"Mana Sufficient\" is a binary.\n\nThe Sender fixes the Inscription, and appoints the Receiver.\n\nCLAUSE: Deliver.\nThe Sender may send the Inscription to the Receiver, and afterwards pay the Mana Cost to the Receiver.\n\nCLAUSE: Validate.\nThe Receiver may declare Mana Sufficient.\n\nCLAUSE: Render.\nThe Receiver may, if Mana Sufficient is declared, certify the Inscription.","notes":"carries validation-gates-rendering (the Receiver certifies the Inscription only under Mana Sufficient declared, and delivery orders inscription before mana payment in the Deliver chain); omits the message schema fields, accepted sources, and shimmer rendering. Folded from send-spine-protocol-family (grammar-forward, run lexr4).","counts":{"definitions":5,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":{"type":"gate","clause":"Render","condition":"Mana Sufficient"},"grandfathered":false},{"census":"LEXPVM-T-143","term":"Ceremony Engine","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Ceremony Engine","lex":"LEX Ceremony Engine.\n\"First Blade\" is a person.\n\"Second Blade\" is a person.\n\"Engine\" is this contract.\n\"Crossing Record\" is a text.\n\"First Ready\" is a binary.\n\"Second Ready\" is a binary.\n\nThe First Blade appoints the Second Blade, and fixes the Crossing Record.\n\nCLAUSE: Ready First.\n\nThe First Blade may declare First Ready.\n\nCLAUSE: Ready Second.\n\nThe Second Blade may declare Second Ready.\n\nCLAUSE: Converged.\n\"Converged\" is defined as: First Ready is declared and Second Ready is declared.\n\nCLAUSE: Cross.\n\nThe First Blade may, if this Engine is Converged: send the Crossing Record to the Second Blade.","notes":"conjunction: the defined predicate Converged requires all of First Ready AND Second Ready. Omissions per the term's canon anchor. Assayer-authored (ieee7012-standards-family held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":5,"promiseEdges":5},"claim":{"type":"conjunction","predicate":"Converged","conjuncts":["First Ready","Second Ready"]},"grandfathered":false},{"census":"LEXPVM-T-144","term":"Universe Blade","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Universe Blade","lex":"LEX Universe Blade.\n\n\"First Person\" is a person.\n\"Universe Blade\" is data.\n\"Empirical Data Point\" is data.\n\"Blade Forged\" is a binary.\n\nCLAUSE: Forge.\nThe First Person may fix the Universe Blade, and afterwards declare Blade Forged.\n\nCLAUSE: Record.\nThe First Person may, if Blade Forged is declared: register the Empirical Data Point.","notes":"gate: the Record clause is reachable only under the Blade Forged condition. Universal cast rule (OT-7): sections naming no actor take the First Person as holder. Omissions per the term canon anchor. Assayer-authored held-out, recipe-only (run lexr5); keystone Notes.","counts":{"definitions":4,"clauses":2,"sentences":2,"triples":3,"promiseEdges":3},"claim":{"type":"gate","clause":"Record","condition":"Blade Forged"},"grandfathered":false},{"census":"LEXPVM-T-145","term":"Dragon Anatomy","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Dragon Anatomy","lex":"LEX Dragon Anatomy.\n\n\"First Person\" is a person.\n\"Boundary\" is a text.\n\"Hide\" is a text.\n\"Brain\" is a text.\n\"Forge\" is a text.\n\"Ceremony\" is a text.\n\"Flight\" is a text.\n\"Flight Inscribed\" is a binary.\n\"Dragon Woken\" is a binary.\n\nCLAUSE: Establish.\nThe First Person may register the Boundary, then register the Hide, then register the Brain, then register the Forge, then register the Ceremony, then register the Flight, and then declare Flight Inscribed.\n\nCLAUSE: Wake.\nThe First Person may, if Flight Inscribed is declared, declare Dragon Woken.","notes":"ordering: the six anatomy parts are established in the canon Act sequence, Boundary through Flight, ending in the Flight inscription, and the Wake clause is additionally gated on Flight Inscribed (the dragon wakes only after the last part is in place); zero-party section, First Person holds per the universal cast rule; omits the Act numbers, the per-part status column, and the proven versus grounded labels. Folded from lexr5.2:zero-party-universal-cast-charter (run lexr5).","counts":{"definitions":9,"clauses":2,"sentences":2,"triples":8,"promiseEdges":8},"claim":{"clause":"Establish","sequence":["register:Boundary","register:Hide","register:Brain","register:Forge","register:Ceremony","register:Flight","declare:Flight Inscribed"],"type":"ordering"},"grandfathered":false},{"census":"LEXPVM-T-146","term":"Understanding-as-Key","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### Understanding-as-Key","lex":"LEX Understanding as Key.\n\n\"First Person\" is a person.\n\"Participant\" is a person.\n\"Shared Vocabulary\" is a text.\n\"Constellation Path\" is data.\n\"Blade\" is data.\n\"Proverb\" is a text.\n\"Witnessed\" is a binary.\n\nThe First Person appoints the Participant.\n\nCLAUSE: Walk.\nThe First Person may register the Shared Vocabulary, and afterwards certify the Constellation Path, and afterwards fix the Blade, and afterwards file a Proverb.\n\nCLAUSE: Witness.\nThe Participant may, if Proverb is filed, declare Witnessed.\n\nCLAUSE: Trust.\nThe First Person may, if Witnessed is declared, certify the Blade.","notes":"captures the five ceremony steps: the officiant's chain orders vocabulary capture, constellation mapping, blade forging, proverb inscription (the ordering claim), and the fifth step, bilateral witness, is the Participant's separate gated clause closing back into Trust (SG-4 split form for a two-sided rite; Participant is the section's own word for the other side); no credential or stored secret is defined anywhere in the text, comprehension is the only route, which is the term's key insight; omits the post-quantum qubit framing. Folded from lexr5.1:cast-infrastructure-charter (run lexr5).","counts":{"definitions":7,"clauses":3,"sentences":4,"triples":7,"promiseEdges":7},"claim":{"clause":"Walk","sequence":["register:Shared Vocabulary","certify:Constellation Path","fix:Blade","file:Proverb"],"type":"ordering"},"grandfathered":false},{"census":"LEXPVM-T-147","term":"Quantum Threshold","register":"glossary · conjectured expression of documented term","cites":"glossary-master-v4 § ### Quantum Threshold","lex":"LEX Quantum Threshold.\n\n\"Key Holder\" is a person.\n\"Quantum Adversary\" is a person.\n\"Key Entropy\" is an amount.\n\"Logical Qubit Budget\" is an amount.\n\"Toffoli Budget\" is an amount.\n\"Threshold\" is this contract.\n\"Machine Assembled\" is a binary.\n\"Broadcast Time\" is a time.\n\nThe Key Holder pays the Key Entropy into escrow, appoints the Quantum Adversary, fixes the Logical Qubit Budget, and fixes the Toffoli Budget.\n\nCLAUSE: Assemble Machine.\nThe Quantum Adversary may declare Machine Assembled.\n\nCLAUSE: Broadcast.\nThe Key Holder may fix the Broadcast Time as the current time.\n\nCLAUSE: Crossed.\n\"Crossed\" is defined as: the Logical Qubit Budget is fixed and the Toffoli Budget is fixed and Machine Assembled is declared and the Broadcast Time is fixed.\n\nCLAUSE: Crack On Spend.\nThe Quantum Adversary may, if this Threshold is Crossed: pay from escrow the Key Entropy to themselves.\n\nCLAUSE: Keep Residue.\nThe Key Holder may, if Machine Assembled is not declared: return the remainder of the escrow to the Key Holder.","notes":"threshold carried as a four-conjunct defined condition (both budgets fixed, machine assembled, broadcast time fixed) gating the adversary drain of the escrowed key entropy; the residue returns only while Machine Assembled stays undeclared. Omits qubit and Toffoli counts and timeline estimates. Assayer-authored (escrow-conservation-recipe held-out, recipe-only); keystone Notes.","counts":{"definitions":8,"clauses":5,"sentences":5,"triples":8,"promiseEdges":8},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-148","term":"2D Fortress","register":"glossary · conjectured expression of reported term","cites":"glossary-master-v4 § ### 2D Fortress","lex":"LEX Two Dimensional Fortress.\n\n\"Key Holder\" is a person.\n\"Quantum Adversary\" is a person.\n\"Verifier\" is a person.\n\"Scalar Secret\" is an amount.\n\"Public Point\" is a text.\n\"Period Found\" is a binary.\n\nThe Key Holder appoints the Verifier, appoints the Quantum Adversary, pays the Scalar Secret into escrow, and afterwards registers the Public Point.\n\nCLAUSE: Find Period.\nThe Quantum Adversary may declare Period Found.\n\nCLAUSE: Reverse The Multiplication.\nThe Quantum Adversary may, if Period Found is declared: pay from escrow the Scalar Secret to themselves.","notes":"direction is load-bearing and stated here: the fortress FALLS. Period-finding gates the Quantum Adversary draining the escrowed scalar secret, and the Key Holder holds no reclaiming clause (impossibility on the defender side, by absence). The lexr2.3 critic flagged direction-elasticity on exactly this entry; the checker cannot falsify a wrong-direction expression, so the direction lives in this Notes line by design. Omits ard\" is an amount.\n\"Second Shard\" is an amount.\n\nThe Master fixes the Master Secret, fixes the First Shard, fixes the Second Shard, appoints the First Emissary, and appoints the Second Emissary.\n\nCLAUSE: Disperse.\nThe Master may pay the First Shard to the First Emissary, and afterwards pay the Second Shard to the Second Emissary.\n\nCLAUSE: First Carry.\nThe First Emissary may certify the First Shard.\n\nCLAUSE: Second Carry.\nThe Second Emissary may certify the Second Shard.","notes":"carries dispersal as an impossibility (shards route outward one per emissary, each emissary certifies only its own shard, and no transfer clause routes the Master Secret to any single emissary: the no-single-shard-holds-the-whole property in clause shape); omits the hemispheric-capture origin and the mirror proverb. Folded from send-spine-protocol-family (grammar-forward, run lexr4).","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":9,"promiseEdges":9},"claim":{"type":"absence","to":"First Emissary","what":"Master Secret"},"grandfathered":false},{"census":"LEXPVM-T-151","term":"The Temporal Thesis","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### The Temporal Thesis","lex":"LEX The Temporal Thesis.\r\n\r\n\"First Person\" is a person.\r\n\"Swordsman\" is a person.\r\n\"Regime\" is this contract.\r\n\"Disclosure\" is a text.\r\n\"Disclosure Time\" is a time.\r\n\"Ceiling Risen\" is a binary.\r\n\r\nThe First Person appoints the Swordsman, and fixes the Disclosure.\r\n\r\nCLAUSE: Mark Disclosure.\r\nThe Swordsman may fix the Disclosure Time as the current time.\r\n\r\nCLAUSE: Observe Ceiling.\r\nThe Swordsman may declare Ceiling Risen.\r\n\r\nCLAUSE: Shelf Expired.\r\n\"Shelf Expired\" is defined as: the Disclosure Time lies at least 24 hours in the past, or Ceiling Risen is declared.\r\n\r\nCLAUSE: Withdraw.\r\nThe Swordsman may, if this Regime is Shelf Expired: terminate this Regime.","notes":"carries protection-buys-time as the attested time-literal predicate (disclosure aged past a stated horizon) or an observed ceiling rise, either expiring the shelf and enabling withdrawal; omits the continuous decay function and the true shelf-life constant, the 24-hour literal is a stand-in since hour and day counts are the subset's only numbers. Anchor: ### The Temporal Thesis.","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":5,"promiseEdges":5},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-152","term":"Manifold Proof","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Manifold Proof","lex":"LEX Manifold Proof.\n\n\"Prover\" is a person.\n\"Walker\" is a person.\n\"Path\" is data.\n\"Proof\" is data.\n\"Secret\" is an amount.\n\"Traversal Complete\" is a binary.\n\nThe Prover appoints the Walker, and fixes the Path.\n\nCLAUSE: Walk.\nThe Walker may register the Path, and afterwards declare Traversal Complete.\n\nCLAUSE: Certify.\nThe Prover may, if Traversal Complete is declared, certify the Proof.","notes":"impossibility as absence: no transfer clause routes Secret to the Walker. Omissions per the term's canon anchor. Assayer-authored (invitation-admission-charter held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":6,"clauses":2,"sentences":3,"triples":5,"promiseEdges":5},"claim":{"type":"absence","to":"Walker","what":"Secret"},"grandfathered":false},{"census":"LEXPVM-T-153","term":"Amnesia Protocol","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Amnesia Protocol","lex":"LEX Amnesia Protocol.\n\n\"Principal\" is a person.\n\"Emissary\" is a person.\n\"Protocol\" is this contract.\n\"Service\" is a text.\n\"Derivation Time\" is a time.\n\"Service Verified\" is a binary.\n\nThe Principal appoints the Emissary, and fixes the Service.\n\nCLAUSE: Mark Derivation.\nThe Principal may fix the Derivation Time as the current time.\n\nCLAUSE: Forgotten.\n\"Forgotten\" is defined as: the Derivation Time lies at least 24 hours in the past.\n\nCLAUSE: Serve.\nThe Emissary may, if this Protocol is Forgotten: send the Service to the Principal.\n\nCLAUSE: Verify Service.\nThe Principal may, if this Protocol is Forgotten: declare Service Verified.","notes":"Structural: gate (both the Emissary's send of the Service and the Principal's verification declaration are conditional on the defined predicate Forgotten, which holds only when the Derivation Time lies at least 24 hours in the past): service and its verification become reachable only after the origin has aged out, forgetting as the protocol itself, verify-without-remembering as clause topology. Omits the zero-knowledge primitive formalism and the Theia cosmology; the 24-hour literal is a stand-in shelf constant (lies-at-least predicate per lexon-example-license). Checker: GATE PASS + RELATION PASS (runs/lexr3/lexr3.1/propose-scratch/t153_amnesia_protocol.lex). Folded from temporal-spine-lifecycle-charter (grammar-forward, run lexr3).","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":5,"promiseEdges":5},"claim":{"type":"gate","clause":"Serve","condition":"Forgotten"},"grandfathered":false},{"census":"LEXPVM-T-154","term":"Ur-Swordsman","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Ur-Swordsman","lex":"LEX Ur-Swordsman.\n\n\"Ur-Swordsman\" is a person.\n\"Principal\" is a person.\n\"Light\" is an amount.\n\nThe Principal appoints the Ur-Swordsman, and fixes the Light.\n\nCLAUSE: Reflect.\nThe Ur-Swordsman may send the Light to the Principal.","notes":"impossibility as absence: no transfer clause routes Light to the Ur-Swordsman. Omissions per the term's canon anchor. Assayer-authored (myterms-agreement-family held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":3,"clauses":1,"sentences":2,"triples":3,"promiseEdges":3},"claim":{"type":"absence","to":"Ur-Swordsman","what":"Light"},"grandfathered":false},{"census":"LEXPVM-T-155","term":"Theia Partition","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### Theia Partition","lex":"LEX Theia Partition.\n\n\"Theia\" is a person.\n\"Earth\" is a person.\n\"Moon\" is a person.\n\"Sun\" is a person.\n\"Body\" is data.\n\"Silence\" is a text.\n\"Heat\" is data.\n\nCLAUSE: Partition.\nThe Theia may send the Body to the Earth, send the Silence to the Moon, and afterwards send the Heat to the Sun.","notes":"ordering: the partition is one distribution chain performed by the section's named impactor (Body to the Earth, then Silence to the Moon, then Heat to the Sun), carrying partition-not-destruction as three outbound routes in canonical order from a single officiant. Deliberately omits the etymology discovery about the distributed letters and the naming proverb; register stays conjectured because the canon marks this a cosmological metaphor. Folded from lexr5.1:zero-party-universal-cast-charter (run lexr5).","counts":{"definitions":7,"clauses":1,"sentences":1,"triples":3,"promiseEdges":3},"claim":{"clause":"Partition","sequence":["send:Body","send:Silence","send:Heat"],"type":"ordering"},"grandfathered":false},{"census":"LEXPVM-T-156","term":"Merge Catastrophe","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Merge Catastrophe","lex":"LEX Merge Catastrophe.\n\n\"Master\" is a person.\n\"Swordsman\" is a person.\n\"Mandate\" is an amount.\n\nThe Master appoints the Swordsman, and fixes the Mandate.\n\nCLAUSE: Separate.\nThe Master may send the Mandate to the Swordsman.\n\nCLAUSE: Protect.\nThe Swordsman may certify the Mandate.","notes":"impossibility as absence: no transfer clause routes Mandate to the Master. Omissions per the term's canon anchor. Assayer-authored (myterms-agreement-family held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":3,"clauses":2,"sentences":3,"triples":4,"promiseEdges":4},"claim":{"type":"absence","to":"Master","what":"Mandate"},"grandfathered":false},{"census":"LEXPVM-T-157","term":"Zero-Knowledge Orbit","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Zero-Knowledge Orbit","lex":"LEX Zero Knowledge Orbit.\n\n\"First Person\" is a person.\n\"Moon\" is a person.\n\"Collision\" is a text.\n\"Tide\" is a text.\n\"Orbit\" is this contract.\n\nThe First Person appoints the Moon.\n\nCLAUSE: Orbit.\nThe Moon may fix the Collision, and afterwards certify the Tide.\n\nCLAUSE: Prove.\nThe Moon may send the Tide to the First Person.","notes":"impossibility as absence: no transfer clause routes Collision to the First Person. Omissions per the term canon anchor. Assayer-authored held-out, recipe-only (run lexr5); keystone Notes.","counts":{"definitions":5,"clauses":2,"sentences":3,"triples":4,"promiseEdges":4},"claim":{"type":"absence","to":"First Person","what":"Collision"},"grandfathered":false},{"census":"LEXPVM-T-158","term":"Four Bodies Model","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### Four Bodies Model","lex":"LEX Four Bodies Model.\n\n\"Sun\" is a person.\n\"Earth\" is a person.\n\"Moon\" is a person.\n\"Human\" is a person.\n\"Protection\" is a binary.\n\"Delegation\" is a binary.\n\"Reflection\" is a binary.\n\"Connection\" is a binary.\n\nThe Sun appoints the Moon.\nThe Earth appoints the Human.\n\n\"Quaternion Complete\" is defined as: Protection is declared and Delegation is declared and Reflection is declared and Connection is declared.\n\nCLAUSE: Protect.\nThe Sun may declare Protection.\n\nCLAUSE: Delegate.\nThe Earth may declare Delegation.\n\nCLAUSE: Reflect.\nThe Moon may declare Reflection.\n\nCLAUSE: Connect.\nThe Human may declare Connection.","notes":"conjunction: Quaternion Complete requires all four bodies' aspects declared (Protection, Delegation, Reflection, Connection), the quaternion as a four-way y design · 2 acts at v1.7.1)","lex":"LEX Tome Eight.\n\n\"Archivist\" is a person.\n\"City\" is a person.\n\"Record\" is this contract.\n\"First Act\" is a text.\n\"Second Act\" is a text.\n\"Future Act\" is a text.\n\nThe Archivist appoints the City.\n\nCLAUSE: Bind First.\nThe Archivist may file the First Act.\n\nCLAUSE: Bind Second.\nThe City may file the Second Act.\n\nCLAUSE: Kept.\n\"Kept\" is defined as: the First Act is filed and the Second Act is filed.\n\nCLAUSE: Admit Future.\nThe Archivist may, if this Record is Kept: register the Future Act.","notes":"conjunction: the defined predicate Kept requires all of First Act AND Second Act. Omissions per the term's canon anchor. Assayer-authored (myterms-party-charter-spell held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":4,"promiseEdges":4},"claim":{"type":"conjunction","predicate":"Kept","conjuncts":["First Act","Second Act"]},"grandfathered":false},{"census":"LEXPVM-T-186","term":"The Register of Invitations 🪑 (v1.7.1 · new structural register)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### 24.5 The Register of Invitations 🪑 (v1.7.1 · new structural register)","lex":"LEX Register of Invitations.\n\n\"Keeper\" is a person.\n\"Visiting Mage\" is a person.\n\"Joint Folio\" is a text.\n\"Geometry Congruent\" is a binary.\n\"Invitation Recorded\" is a binary.\n\nThe Keeper appoints the Visiting Mage.\n\nCLAUSE: Read Foundations.\nThe Keeper may declare Geometry Congruent.\n\nCLAUSE: Record Invitation.\nThe Keeper may, if Geometry Congruent is declared: declare Invitation Recorded.\n\nCLAUSE: Write.\nThe Visiting Mage may, if Invitation Recorded is declared: file the Joint Folio.\n\nCLAUSE: Bind To Library.\nThe Keeper may, if Joint Folio is filed: certify the Joint Folio.","notes":"invitation posture as a two-stage gate: the visiting stylus's only write route is conditional on the Keeper's recorded  term","cites":"glossary-master-v4 § ### 24.7 The four conditions of update (v1.7.1 · city-wide editorial protocol)","lex":"LEX Four Conditions of Update.\n\n\"Editor\" is a person.\n\"Watcher\" is a person.\n\"Resident Mage\" is a person.\n\"Keeper\" is a person.\n\"Editorial Act\" is this contract.\n\"Update\" is a text.\n\"Congruent Geometry\" is a binary.\n\"Recognisable Signature\" is data.\n\"Scribal Witness\" is data.\n\"Prior Preserved\" is a binary.\n\nThe Keeper appoints the Editor, appoints the Watcher, and appoints the Resident Mage.\n\nCLAUSE: Test Geometry.\nThe Watcher may declare Congruent Geometry.\n\nCLAUSE: Sign.\nThe Editor must file the Recognisable Signature.\n\nCLAUSE: Witness.\nThe Resident Mage may file the Scribal Witness.\n\nCLAUSE: Preserve Prior.\nThe Keeper may declare Prior Preserved.\n\nCLAUSE: Admissible.\n\"Admissible\" is defined as: Congruent Geometry is declared and Recognisable Signature is filed and Scribal Witness is filed and Prior Preserved is declared.\n\nCLAUSE: Bind Update.\nThe Keeper may, if this Editorial Act is Admissible: register the Update.","notes":"editorial admission as a four-way conjunction: the defined predicate Admissible requires the watcher's congruence declaration, the editor's filed signature (a duty, must), the resident mage's filed scribal witness, and the keeper's preservation declaration, each produced by its own side in its own clause, with binding gated on the whole predicate. Omits the addenda fallback for anonymous edits and the reading-not-a-vote nuance of the congruence test. Folded from role-charter-spell-family (spell-grammar, run lexr4).","counts":{"definitions":10,"clauses":6,"sentences":6,"triples":8,"promiseEdges":8},"claim":{"type":"conjunction","predicate":"Admissible","conjuncts":["Congruent Geometry","Recognisable Signature","Scribal Witness","Prior Preserved"]},"grandfathered":false},{"census":"LEXPVM-T-189","term":"Vitalik (first invited visiting mage · v1.7.1)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### 24.8 Vitalik (first invited visiting mage · v1.7.1)","lex":"LEX First Invited Visiting Mage.\n\n\"Watcher\" is a person.\n\"Visiting Mage\" is a person.\n\"Resident Mage\" is a person.\n\"Tier Stipend\" is an amount.\n\"Appended Folio\" is a text.\n\"Geometry Congruent\" is a binary.\n\nThe Watcher appoints the Resident Mage, and fixes the Tier Stipend.\n\nCLAUSE: Recognise.\nThe Watcher may declare Geometry Congruent.\n\nCLAUSE: Write.\nThe Visiting Mage may, if Geometry Congruent is declared, file the Appended Folio.\n\nCLAUSE: Sustain.\nThe Watcher may pay the Tier Stipend to the Resident Mage.","notes":"carries the no-tier exclusion as an absence of routes: the tier stipend pays only to resident mages and no clause can route it to the visiting mage (not a cast member, not a kindred subcategory, not a workshop-keeper), whose only permitted act is filing the appended folio under declared congruent geometry (authority limited to the appended folio). Omits the four-faced tablet's inscriptions and the named identity. Anchor: ### 24.8 Vitalik (first invited visiting mage · v1.7.1). Folded from invitation-admission-charter (grammar-forward, run lexr4).","counts":{"definitions":6,"clauses":3,"sentences":4,"triples":5,"promiseEdges":5},"claim":{"type":"absence","to":"Visiting Mage","what":"Tier Stipend"},"grandfathered":false},{"census":"LEXPVM-T-192","term":"Conjectures C64 + C65 (v1.7.0 + v1.7.1 candidates)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### 24.11 Conjectures C64 + C65 (v1.7.0 + v1.7.1 candidates)","lex":"LEX Candidate Conjecture Register.\n\"Registrar\" is a person.\n\"Candidate\" is a person.\n\"Register\" is this contract.\n\"Conjecture\" is a text.\n\"First Instance\" is a text.\n\"Second Instance\" is a text.\n\nThe Registrar appoints the Candidate, fixes the Conjecture, and fixes the First Instance.\n\nThe Candidate fixes

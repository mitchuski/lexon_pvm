ounts":{"definitions":6,"clauses":2,"sentences":3,"triples":4,"promiseEdges":4},"claim":{"type":"ordering","clause":"Number","sequence":["fix:Conjecture Number","register:Conjecture Number"]},"grandfathered":false},{"census":"LEXPVM-T-194","term":"Moving Ceiling R(t) and Shelf Life t*","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### 25.2 Moving Ceiling R(t) and Shelf Life t*","lex":"LEX Moving Ceiling.\n\n\"First Person\" is a person.\n\"Auditor\" is a person.\n\"Adversary\" is a person.\n\"Total Uncertainty\" is an amount.\n\"Adversary Capacity\" is an amount.\n\"Proof Time\" is a time.\n\"Full Reconstruction\" is a text.\n\"Capacity Grown\" is a binary.\n\"Guarantee\" is this contract.\n\nThe First Person appoints the Auditor, appoints the Adversary, and fixes the Total Uncertainty.\n\nCLAUSE: Mark Proof.\nThe Auditor may fix the Proof Time as the current time.\n\nCLAUSE: Grow.\nThe Auditor may, if the Proof Time lies at least 30 days in the past, fix the Adversary Capacity.\n\nCLAUSE: Observe Growth.\nThe Auditor may, if the Adversary Capacity is fixed, declare Capacity Grown.\n\nCLAUSE: Expired.\n\"Expired\" is defined as: the Adversary Capacity is fixed and Capacity Grown is declared.\n\nCLAUSE: Reconstruct.\nThe Adversary may, if this Guarantee is Expired: register a Full Reconstruction.","notes":"Carries the moving-ceiling asymmetry as temporal clause structure: the Total Uncertainty is fixed once in the recital (time-independent), while the Adversary Capacity becomes fixable only through the attested time predicate (Proof Time lies at least 30 days in the past), so capacity grows with elapsed time and the protected entropy does not; reconstruction is reachable only through the Expired defined-predicate gate, and the pre-expiry impossibility is clause absence. Omits the continuous R(t) function and the true shelf-life constant; the 30-day literal is a stand-in, since hour and day counts are the subset's only numbers. Term name truncated here per hard constraint; the keystone should carry the cites anchor verbatim from CENSUS.json. Folded from quantity-gate-charter (canon-forward, run lexr2).","counts":{"definitions":9,"clauses":5,"sentences":5,"triples":7,"promiseEdges":7},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-200","term":"Parity Cube · Octahedral Gap","register":"glossary · conjectured expression of conjectured term","cites":"glossary-master-v4 § ### 25.8 Parity Cube · Octahedral Gap","lex":"LEX Parity Cube and Octahedral Gap.\n\n\"Geometer\" is a person.\n\"Dual Geometer\" is a person.\n\"Gap\" is a person.\n\"Lattice Volume\" is an amount.\n\"Parity Cover\" is an amount.\n\"Octahedral Cover\" is an amount.\n\"Parity Read\" is a binary.\n\"Dual Read\" is a binary.\n\nThe Geometer pays the Lattice Volume into escrow, appoints the Dual Geometer, appoints the Gap, fixes the Parity Cover, and fixes the Octahedral Cover.\n\nCLAUSE: Read Parity.\nThe Geometer may declare Parity Read.\n\nCLAUSE: Claim Parity Cube.\nThe Geometer may, if Parity Read is declared: pay from escrow the Parity Cover to themselves.\n\nCLAUSE: Read Dual.\nThe Dual Geometer may declare Dual Read.\n\nCLAUSE: Claim Octahedron.\nThe Dual Geometer may, if Dual Read is declared: pay from escrow the Octahedral Cover to themselves.\n\nCLAUSE: Keep Gap Open.\nThe Gap may, if Dual Read is declared: return the remainder of the escrow to the Gap.","notes":"conservation = parity cover plus octahedral cover plus the open remainder exhaust the escrowed lattice volume, the octahedral gap being the remainder itself, held by the Gap; ordering = each cover is drawn only after its reading stands declared; impossibility as absence (no clause lets either geometer take the remainder, the gap stays open at candidate strength). Omits the lattice cardinality and the cube-of-cubes decomposition. Assayer-authored (escrow-conservation-charter held-out, recipe-only).","counts":{"definitions":8,"clauses":5,"sentences":6,"triples":10,"promiseEdges":10},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-201","term":"Regime 1 · 🪢 Presence Mana","register":"glossary · conjectured expression of specified term","cites":"glossary-master-v4 § ### 25.9 Regime 1 · 🪢 Presence Mana","lex":"LEX Presence Mana Regime One.\n\n\"First Person\" is a person.\n\"Bearer\" is a person.\n\"Witness\" is a person.\n\"Presence Color\" is data.\n\"Mana Charge\" is an amount.\n\"Locally Present\" is a binary.\n\"Regime Fence\" is this contract.\n\nThe First Person appoints the Bearer, and appoints the Witness.\n\nCLAUSE: Show Presence.\nThe Bearer may declare Locally Present.\n\nCLAUSE: Color.\nThe Bearer may, if Locally Present is declared, fix the Presence Color.\n\nCLAUSE: Charge.\nThe Bearer may, if Locally Present is declared, fix the Mana Charge.\n\nCLAUSE: Carried As Color.\n\"Carried As Color\" is defined as: the Presence Color is fixed and Locally Present is declared.\n\nCLAUSE: Keep.\nThe Bearer may, if this Regime Fence is Carried As Color: register the Presence Color.","notes":"regime fence carried as a defined conjunction (presence color fixed and locally present declared) gating the only register; ordering = color and charge are fixable only after Locally Present is declared; impossibility as absence (no clause moves the Mana Charge anywhere: presence mana is non-transferable in regime one). Omits color values and charge magnitude. Assayer-authored (quantity-gate-charter held-out, recipe-only); keystone Notes.","counts":{"definitions":7,"clauses":5,"sentences":5,"triples":6,"promiseEdges":6},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-202","term":"Seating Lock and Phi Honesty (v10.4.0)","register":"glossary · conjectured expression of canonical term","cites":"glossary-master-v4 § ### 25.10 Seating Lock and Phi Honesty (v10.4.0)","lex":"LEX Seating Lock.\n\n\"Grimoire Keeper\" is a person.\n\"Aletheia\" is a person.\n\"Lethe\" is a person.\n\"Seating Lock\" is data.\n\"Lower Seat\" is data.\n\"Delta Share\" is an amount.\n\"Lock Pinned\" is a binary.\n\nThe Grimoire Keeper appoints Aletheia, and appoints Lethe, and fixes the Seating Lock.\n\nCLAUSE: Pin.\nThe Grimoire Keeper may declare Lock Pinned.\n\nCLAUSE: Seat.\nThe Lethe may certify the Lower Seat.\n\nCLAUSE: Assign.\nThe Grimoire Keeper may, if Lock Pinned is declared: send the Delta Share to Aletheia.","notes":"impossibility as absence: no transfer clause routes Delta Share to the Lethe. Omissions per the term's canon anchor. Assayer-authored (rite-and-register-spell held-out, recipe-only, run lexr4); keystone Notes.","counts":{"definitions":7,"clauses":3,"sentences":4,"triples":6,"promiseEdges":6},"claim":{"type":"absence","to":"Lethe","what":"Delta Share"},"grandfathered":false},{"census":"LEXPVM-T-204","term":"Agent","register":"pt-mapping · conjectured expression of canonical mapping","cites":"promise-theory-ref-v1-4 § ## Quick Reference: Concept Mappings","lex":"LEX Promise Agent.\n\n\"Agent\" is a person.\n\"Neighbor\" is a person.\n\"Own Conduct\" is a text.\n\"Peer Conduct\" is a text.\n\"Assessment\" is an amount.\n\nThe Agent fixes the Own Conduct.\nThe Neighbor fixes the Peer Conduct.\n\nCLAUSE: Promise Own Conduct.\nThe Agent may send the Own Conduct to the Neighbor.\n\nCLAUSE: Assess.\nThe Agent may fix the Assessment, and afterwards certify the Assessment.","notes":"Structural: independent assessment as impossibility (no transfer clause routes the Assessment to the Neighbor: an agent's assessment is local and never transfers, so trust is not transitive), plus the Autonomy Axiom in recital shape (each person fixes only its own conduct, and the only promise route to the Neighbor carries the Agent's Own Conduct). Omits: the assessment function alpha(pi) semantics and multi-neighbor topology; modeled minimally with one neighbor. Anchor: ## Quick Reference: Concept Mappings. Folded from pt-primitive-polarity-charter (canon-forward, run lexr3).","counts":{"definitions ingency as gate (the Body moves to the Promisee only through the declared Condition Met; strip the gate and the text collapses to an unconditional micro promise, which is exactly the mutation twin), and the condition is observed by the promiser itself (Observe clause: assessment of c is also autonomous). Omits: the mapped conditional-independence reading (Swordsman and Mage independent given X) and any probability semantics. Anchor: ## Quick Reference: Concept Mappings. Folded from pt-primitive-polarity-charter (canon-forward, run lexr3).","counts":{"definitions":4,"clauses":2,"sentences":3,"triples":4,"promiseEdges":4},"claim":{"type":"gate","clause":"Keep","condition":"Condition Met"},"grandfathered":false},{"census":"LEXPVM-T-207","term":"Trust (0-1)","register":"pt-mapping · conjectured expression of canonical mapping","cites":"promise-theory-ref-v1-4 § ## Quick Reference: Concept Mappings","lex":"LEX Trust Scalar.\r\n\r\n\"Truster\" is a person.\r\n\"Trustee\" is a person.\r\n\"Relationship\" is this contract.\r\n\"Trust Level\" is an amount.\r\n\"Promise Kept\" is a binary.\r\n\"Promise Broken\" is a binary.\r\n\r\nThe Truster appoints the Trustee.\r\n\r\nCLAUSE: Set Level.\r\nThe Truster may fix the Trust Level.\r\n\r\nCLAUSE: Assess Kept.\r\nThe Truster may declare Promise Kept.\r\n\r\nCLAUSE: Assess Broken.\r\nThe Truster may declare Promise Broken.\r\n\r\nCLAUSE: Trustworthy.\r\n\"Trustworthy\" is defined as: Promise Kept is declared and Promise Broken is not declared.\r\n\r\nCLAUSE: Reward.\r\nThe Truster may, if this Relationship is Trustworthy: certify the Trust Level.","notes":"carries trust as a truster-held scalar amount whose certification is gated on the defined predicate over the truster's own assessments (kept without broken), preserving that trust is assessed only by the promisee side; omits the 0 to 1 numeric range and the update rule, amounts carry no literals in the subset. Anchor: ## Quick Reference: Concept Mappings.","counts":{"definitions":6,"clauses":5,"sentences":5,"triples":5,"promiseEdges":5},"claim":null,"grandfathered":true},{"census":"LEXPVM-T-208","term":"Invitation","register":"pt-mapping · conjectured expression of canonical mapping","cites":"promise-theory-ref-v1-4 § ## Quick Reference: Concept Mappings","lex":"LEX Invitation.\n\n\"First Party\" is a person.\n\"Second Party\" is a person.\n\"Terms\" is a text.\n\"Acceptance\" is a binary.\n\"Proposal\" is a text.\n\"Relationship\" is this contract.\n\nThe First Party appoints the Second Party, fixes the Terms, and fixes the Proposal.\n\nCLAUSE: Proffer.\nThe First Party may send the Terms to the Second Party.\n\nCLAUSE: Accept.\nThe Second Party may declare Acceptance.\n\nCLAUSE: Standing.\n\"Standing\" is defined as: the Terms is fixed and Acceptance is declared.\n\nCLAUSE: Propose.\nThe First Party may, if this Relationship is Standing: send the Proposal to the Second Party.","notes":"Structural: invitation as conjunction (the defined predicate Standing requires BOTH proffered Terms fixed AND declared Acceptance; drop either conjunct and the proposal loses its warrant, the mutation twin drops Terms and models consent without proffered terms), plus the ordering it induces (Propose is gated on Standing, so the acceptance relationship strictly precedes any specific proposal, the canon's own definition of invitation). Omits: MyTerms agreement-taxonomy content and renegotiation of terms. Anchor: ## Quick Reference: Concept Mappings. Folded from pt-primitive-polarity-charter (canon-forward, run lexr3).","counts":{"definitions":6,"clauses":4,"sentences":4,"triples":6,"promiseEdges":6},"claim":{"type":"conjunction","predicate":"Standing","conjuncts":["Terms","Acceptance"]},"grandfathered":false},{"census":"LEXPVM-T-209","term":"Imposition/Attack","register":"pt-mapping · conjectured expression of canonical mapping","cites":"promise-theory-ref-v1-4 § ## Quick Reference: Concept Mappings","lex":"LEX Imposition.\n\n\"Imposer\" is a person.\n\"Target\" is a person.\n\"Swordsman\" is a person.\n\"Unsolicited Proposal\" is a text.\n\"Acceptance\" is a binary.\n\"Data Value\" is an amount.\n\"Refused\" is a binary.\n\nThe Imposer fixes the Unsolicited Proposal.\nThe Target appoints the Swordsman, and fixes the Data Value.\n\nCLAUSE: Impose.\nThe Imposer may send the Unsolicited Proposal to the Target.\n\nCLAUSE: Guard.\nThe Swordsman may, if Acceptance is not declared, declare Refused.","notes":"Structural: attack as ungated send (the Impose clause carries no acceptance condition, the deliberate structural contrast with Invitation's Standing-gated Propose), refusal gated on non-acceptance (Guard fires only while Acceptance is not declared), and extraction as impossibility (no transfer clause routes the Target's Data Value to the Imposer: the text grants imposition no economy, surveillance extraction never succeeds by this contract). Omits: dark-pattern taxonomy and post-hoc consent rationalization. Anchor: ## Quick Reference: Concept Mappings. Folded from pt-primitive-polarity-charter (canon-forward, run lexr3).","counts":{"definitions":7,"clauses":2,"sentences":4,"triples":5,"promiseEdges":5},"claim":{"type":"absence","to":"Imposer","what":"Data Value"},"grandfathered":false},{"census":"LEXPVM-T-210","term":"(+) Give Promise","register":"pt-mapping · conjectured expression of canonical mapping","cites":"promise-theory-ref-v1-4 § ## Quick Reference: Concept Mappings","lex":"LEX Give Promise.\n\n\"Swordsman\" is a person.\n\"First Person\" is a person.\n\"Protection Offer\" is a text.\n\nThe Swordsman appoints the First Person.\n\nCLAUSE: Give.\nThe Swordsman may fix the Protection Offer, and afterwards send the Protection Offer to the First Person.","notes":"Structural: outbound polarity as ordering (in Give the Swordsman first fixes the Protection Offer and afterwards sends it: commitment precedes emission, one cannot give an unbound offer; the reversed order is exactly the mutation twin), and the plus pole as  clause ownership: protection and boundary clauses belong to the Swordsman, delegation to the Mage, authorization to the First Person; delegation is gated on the authorization declaration (SG-1, SG-3). The Autonomy Axiom rides the actor bindings: no clause lets one agent register another's promise. Omits promise polarity notation.","lex":"LEX The Four Promises.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Protection\" is a text.\n\"Delegation Plan\" is a text.\n\"Authorization\" is a text.\n\"Task Authorized\" is a binary.\n\"Boundary Held\" is a binary.\n\nThe First Person appoints the Swordsman, appoints the Mage, and fixes the Authorization.\n\nCLAUSE: Promise Protection.\nThe Swordsman may register the Protection.\n\nCLAUSE: Hold Boundary.\nThe Swordsman may declare Boundary Held.\n\nCLAUSE: Authorize.\nThe First Person may declare Task Authorized.\n\nCLAUSE: Promise Delegation.\nThe Mage may, if Task Authorized is declared: register the Delegation Plan.","claimList":[{"type":"gate","clause":"Promise Delegation","condition":"Task Authorized"}]},{"slug":"t2_separation_bound","title":"The Separation Bound","source":"TRUSTS.md T2 (I(S;M|FP) < epsilon; cannot, by architectural design)","claims":["absence"],"notes":"the separation bound as pure topology (SG-5 absence form): the proposal reaches the prover only through the Gap relay, the verdict flows to the First Person, and NO transfer clause routes anything back to the Mage: the proposer cannot receive the prover's output or the witness material, by construction not by promise. This is the critic-named claim the constitution owed the corpus. Omits the mutual-information formalism.","lex":"LEX The Separation Bound.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Gap\" is a person.\n\"Proposal\" is a text.\n\"Verdict\" is a text.\n\"Round Value\" is an amount.\n\nThe First Person pays the Round Value into escrow, appoints the Swordsman, appoints the Mage, and appoints the Gap.\n\nCLAUSE: Propose.\nThe Mage may send the Proposal to the Gap.\n\nCLAUSE: Relay.\nThe Gap may send the Proposal to the Swordsman.\n\nCLAUSE: Return Verdict.\nThe Swordsman may send the Verdict to the First Person.\n\nCLAUSE: Close Round.\nThe First Person may pay from escrow the Round Value to the Gap.","claimList":[{"type":"absence","to":"Mage"}]},{"slug":"t3_shared_root","title":"The Shared Root","source":"TRUSTS.md T3 (Origin(S) intersect Origin(M) = {P})","claims":["conjunction"],"notes":"the shared root as the recital (SG-2): both agents are appointed and both boot documents fixed by the First Person before any clause; Rooted is the conjunction of exactly the shared documents, and booting is gated on it. Everything the agents share sits above the first CLAUSE; nothing else is shared below it. Omits the seat-card Reads lists.","lex":"LEX The Shared Root.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Mage\" is a person.\n\"Root\" is this contract.\n\"Ground Rules\" is a text.\n\"Trusts\" is a text.\n\"Booted\" is a binary.\n\nThe First Person appoints the Swordsman, appoints the Mage, fixes the Ground Rules, and fixes the Trusts.\n\nCLAUSE: Rooted.\n\"Rooted\" is defined as: the Ground Rules is fixed and the Trusts is fixed.\n\nCLAUSE: Boot.\nThe First Person may, if this Root is Rooted: declare Booted.","claimList":[{"type":"conjunction","predicate":"Rooted","conjuncts":["Ground Rules","Trusts"]}]},{"slug":"t4_invitation","title":"The Invitation","source":"TRUSTS.md T4 (consent first: invitation, not attack; IEEE 7012 posture)","claims":["ordering","gate"],"notes":"invitation-not-attack as clause order (SG-4): the terms travel BEFORE the offer exists, and the exchange is gated on the entity's own acceptance declaration; the first party proffers. Omits the MyTerms registry mechanics.","lex":"LEX The Invitation.\n\n\"First Person\" is a person.\n\"Entity\" is a person.\n\"Terms\" is a text.\n\"Offer\" is a text.\n\"Terms Accepted\" is a binary.\n\nThe First Person appoints the Entity, and fixes the Terms.\n\nCLAUSE: Proffer.\nThe First Person may send the Terms to the Entity, and afterwards register the Offer.\n\nCLAUSE: Accept.\nThe Entity may declare Terms Accepted.\n\nCLAUSE: Exchange.\nThe First Person may, if Terms Accepted is declared: send the Offer to the Entity.","claimList":[{"type":"ordering","clause":"Proffer","sequence":["send:Terms","register:Offer"]},{"type":"gate","clause":"Exchange","condition":"Terms Accepted"}]},{"slug":"t5_multiplicative_gate","title":"The Multiplicative Gate","source":"TRUSTS.md T5 (value is a product; any zero collapses the whole)","claims":["conjunction","absence"],"notes":"the product as a defined conjunction (SG-6): all three factors must stand declared, and only the Swordsman holds the declares; a missing factor is a zero and the escrowed value never releases. The absence claim carries the cliff: no clause routes any value to the Proposer, so a candidate is worth nothing at ANY score until validated (SG-5). Omits the break-even arithmetic.","lex":"LEX The Multiplicative Gate.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Proposer\" is a person.\n\"Gate\" is this contract.\n\"Candidate Value\" is an amount.\n\"Gate Passed\" is a binary.\n\"Constraint Held\" is a binary.\n\"Frontier Beaten\" is a binary.\n\nThe First Person pays the Candidate Value into escrow, appoints the Swordsman, and appoints the Proposer.\n\nCLAUSE: Pass Gate.\nThe Swordsman may declare Gate Passed.\n\nCLAUSE: Hold Constraint.\nThe Swordsman may declare Constraint Held.\n\nCLAUSE: Beat Frontier.\nThe Swordsman may declare Frontier Beaten.\n\nCLAUSE: Validated.\n\"Validated\" is defined as: Gate Passed is declared and Constraint Held is declared and Frontier Beaten is declared.\n\nCLAUSE: Release.\nThe First Person may, if this Gate is Validated: return the remainder of the escrow to the First Person.","claimList":[{"type":"conjunction" le.","claimList":[{"type":"gate","clause":"Report","condition":"Metric Fresh"}]},{"slug":"seat_propose","title":"The Proposer","source":"seats/soulbae-propose.md (plan never implement; blind to witnesses; cite kills)","claims":["gate"],"notes":"GR-6 as a gate: no proposal travels before the killed-lever citation stands declared; the plan goes to the Gap, never to the prover (the blindness itself is carried architecturally by The Separation Bound spell). The Mage plans and sends text only: no escrow, no register, no implementation clause. Omits lens mechanics.","lex":"LEX The Proposer.\n\n\"First Person\" is a person.\n\"Mage\" is a person.\n\"Gap\" is a person.\n\"Lever Plan\" is a text.\n\"Killed Levers Cited\" is a binary.\n\nThe First Person appoints the Mage, and appoints the Gap.\n\nCLAUSE: Cite.\nThe Mage may declare Killed Levers Cited.\n\nCLAUSE: Propose.\nThe Mage may, if Killed Levers Cited is declared: send the Lever Plan to the Gap.","claimList":[{"type":"gate","clause":"Propose","condition":"Killed Levers Cited"}]},{"slug":"seat_gap","title":"The Held-Apart","source":"seats/gap-hold-apart.md (Fiat-Shamir: serialize, hash, draw; persist the bytes)","claims":["ordering"],"notes":"Fiat-Shamir as an ordered chain (SG-4, single officiant): the bytes are persisted first, the seed certified from them, the draw sent last; a draw before the registered bytes is unreachable in clause order. The Gap separates and does not judge: no verdict, no advisory clause. Omits the SHA-256 command discipline.","lex":"LEX The Held Apart.\n\n\"First Person\" is a person.\n\"Gap\" is a person.\n\"Swordsman\" is a person.\n\"Canonical Bytes\" is a text.\n\"Seed\" is a text.\n\"Witness Draw\" is a text.\n\nThe First Person appoints the Gap, and appoints the Swordsman.\n\nCLAUSE: Derive.\nThe Gap may register the Canonical Bytes, and afterwards certify the Seed, and afterwards send the Witness Draw to the Swordsman.","claimList":[{"type":"ordering","clause":"Derive","sequence":["register:Canonical Bytes","certify:Seed","send:Witness Draw"]}]},{"slug":"seat_assay","title":"The Prover","source":"seats/soulbis-assay.md (re-derive the seed first; the verdict does not flatter)","claims":["gate","conjunction"],"notes":"BLOCKED-unless-reproduced as a gate: the full gate is unreachable until the Gap's seed reproduces; the verdict travels only under the Complete conjunction and goes to the Keystone, never back to the Proposer. Omits scratch-dir discipline and the cliff-watch arithmetic (carried by The Multiplicative Gate).","lex":"LEX The Prover.\n\n\"First Person\" is a person.\n\"Swordsman\" is a person.\n\"Keystone\" is a person.\n\"Assay\" is this contract.\n\"Verdict\" is a text.\n\"Seed Reproduced\" is a binary.\n\"Gate Run\" is a binary.\n\nThe First Person appoints the Swordsman, and appoints the Keystone.\n\nCLAUSE: Reproduce.\nThe Swordsman may declare Seed Reproduced.\n\nCLAUSE: Run.\nThe Swordsman may, if Seed Reproduced is declared: declare Gate Run.\n\nCLAUSE: Complete.\n\"Complete\" is defined as: Seed Reproduced is declared and Gate Run is declared.\n\nCLAUSE: Return Verdict.\nThe Swordsman may, if this Assay is Complete: send the Verdict to the Keystone.","claimList":[{"type":"gate","clause":"Run","condition":"Seed Reproduced"},{"type":"conjunction","predicate":"Complete","conjuncts":["Seed Reproduced","Gate Run"]}]},{"slug":"seat_critic","title":"The Critic","source":"seats/critic.md (classify the whole round; exactly one lead; never overrule the prover)","claims":["ordering"],"notes":"classification-before-lead as clause order (SG-4): the single next lead exists only after the whole round is classified, and exactly one travels; the Critic holds no clause touching the Verdict (the prover's verdict stands: red-team the proposer's rationale, never the prover's result). Omits the four classification classes.","lex":"LEX The Critic.\n\n\"First Person\" is a person.\n\"Critic\" is a person.\n\"Keystone\" is a person.\n\"Round Classification\" is a text.\n\"Next Lead\" is a text.\n\nThe First Person appoints the Critic, and appoints the Keystone.\n\nCLAUSE: Classify.\nThe Critic may register the Round Classification, and afterwards send the Next Lead to the Keystone.","claimList":[{"type":"ordering","clause":"Classify","sequence":["register:Round Classification","send:Next Lead"]}]},{"slug":"seat_chronicle","title":"The Chronicler","source":"seats/chronicle.md (verdict first; reversals at win-prominence; a draft, not a filing)","claims":["ordering"],"notes":"verdict-first as clause order (SG-4): the verdict line is registered before anything else, the handoff follows, and only then is the draft filed; the reader learns the outcome first because the grammar puts it first. What is filed is a DRAFT: the keystone reviews and files (GR-10). Omits the chronicle template fields.","lex":"LEX The Chronicler.\n\n\"First Person\" is a person.\n\"Chronicler\" is a person.\n\"Verdict Line\" is a text.\n\"Handoff\" is a text.\n\"Draft\" is a text.\n\nThe First Person appoints the Chronicler, fixes the Verdict Line, and fixes the Handoff.\n\nCLAUSE: Record.\nThe Chronicler may register the Verdict Line, and afterwards register the Handoff, and afterwards file a Draft.","claimList":[{"type":"ordering","clause":"Record","sequence":["register:Verdict Line","register:Handoff","file:Draft"]}]},{"slug":"seat_keystone","title":"The Keystone","source":"seats/keystone.md (fold once, conform green before and after; the pair, not a delegate)","claims":["conjunction","gate"],"notes":"the fold as a triple conjunction: conform green, verdict validated, critic structural, and only then does the fold register; the keystone folds once under the full condition (succ exists only because neg and bnot stayed apart). The door itself lives in The Door spell: the Keystone here has no outward clause. Omits the ledger serialisation list.","lex":"LEX The Keystone.\n\n\"First Person\" is a person.\n\"Keystone\" is a person.\n\"Keystone Step\" const list = document.getElementById('list'), main = document.getElementById('main');
let filter = 'all', q = '';
function badge(c){ if(!c) return '<span class="badge b-gf">grandfathered</span>'; return '<span class="badge b-'+c.type+'">'+c.type+'</span>'; }
function hl(lex){ return lex.replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/^(LEX [^\n]+)/, '<span class="kw">$1</span>')
  .replace(/^(CLAUSE:[^\n]+)/gm, '<span class="cl">$1</span>')
  .replace(/("[^"]+")/g, '<span class="q">$1</span>'); }
function render(){
  const terms = DATA.blocks.filter(b => {
    if (filter === 'spells') return false;
    if (filter !== 'all' && (!b.claim || b.claim.type !== filter)) return false;
    const hay = (b.census + ' ' + b.term + ' ' + JSON.stringify(b.claim||'') + ' ' + (b.notes||'')).toLowerCase();
    return hay.includes(q);
  });
  const sp = (filter === 'all' || filter === 'spells') ? DATA.spells.filter(s => (s.slug+' '+s.title+' '+s.source).toLowerCase().includes(q)) : [];
  let h = '';
  if (sp.length) { h += '<div class="grp">the constitution · trusts + seats</div>';
    for (const s of sp) h += '<div class="it" data-k="s:'+s.slug+'"><div class="id">'+s.slug+'</div><div class="tm">'+s.title + s.claims.map(t=>'<span class="badge b-'+t+'">'+t+'</span>').join('')+'</div></div>'; }
  if (terms.length) { h += '<div class="grp">the census · '+terms.length+' shown</div>';
    for (const b of terms) h += '<div class="it" data-k="b:'+b.census+'"><div class="id">'+b.census+'</div><div class="tm">'+b.term.replace(/</g,'&lt;')+badge(b.claim)+'</div></div>'; }
  list.innerHTML = h;
}
function show(k){
  document.querySelectorAll('.it').forEach(e => e.classList.toggle('sel', e.dataset.k === k));
  const [kind, id] = [k.slice(0,1), k.slice(2)];
  if (kind === 'b') { const b = DATA.blocks.find(x => x.census === id);
    main.innerHTML = '<h2>'+b.term.replace(/</g,'&lt;')+'</h2>'
      + '<div class="meta">'+b.census+' · '+b.register+' · cites '+b.cites+' · '+b.counts.triples+' triples, '+b.counts.promiseEdges+' promise edges</div>'
      + (b.claim ? '<div class="claimline">claim (verified at emit, twin-distinguished): '+JSON.stringify(b.claim)+'</div>' : '<div class="claimline">grandfathered: folded before the relation-claim rule; structural relation named in Notes</div>')
      + '<pre class="lex">'+hl(b.lex)+'</pre>'
      + (b.notes ? '<div class="notes">Notes: '+b.notes.replace(/</g,'&lt;')+'</div>' : '')
      + '<div class="regime">spec-checker regime: relations are clause-graph properties, not executed semantics (CR-11)</div>';
  } else { const s = DATA.spells.find(x => x.slug === id);
    main.innerHTML = '<h2>'+s.title+'</h2>'
      + '<div class="meta">'+s.slug+' · '+s.source.replace(/</g,'&lt;')+'</div>'
      + s.claimList.map(c => '<div class="claimline">claim: '+JSON.stringify(c)+'</div>').join('')
      + '<pre class="lex">'+hl(s.lex)+'</pre>'
      + '<div class="notes">Notes: '+s.notes.replace(/</g,'&lt;')+'</div>'
      + '<div class="regime">constitution corpus: 13/13 CORPUS PASS · node tools/spells_check.mjs</div>';
  }
  main.scrollTop = 0;
}
list.addEventListener('click', e => { const it = e.target.closest('.it'); if (it) show(it.dataset.k); });
document.getElementById('search').addEventListener('input', e => { q = e.target.value.toLowerCase(); render(); });
document.getElementById('filters').addEventListener('click', e => {
  const f = e.target.closest('.f'); if (!f) return;
  filter = f.dataset.f;
  document.querySelectorAll('.f').forEach(x => x.classList.toggle('on', x === f));
  render();
});
render();
</script>
</body>
